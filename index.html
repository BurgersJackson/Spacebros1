                else if (difficultyTier === 3) { outerCount = 24; outerHp = 1; }
                else if (difficultyTier === 4) { outerCount = 24; outerHp = 2; innerCount = 8; innerHp = 1; }
                else if (difficultyTier === 5) { outerCount = 24; outerHp = 2; innerCount = 12; innerHp = 2; }
                else if (difficultyTier >= 6) { 
                    outerCount = 24; 
                    outerHp = 3 + (difficultyTier - 6); 
                    innerCount = 16 + (difficultyTier - 6); 
                    innerHp = 2 + Math.floor((difficultyTier - 6)/2); 
                }

                if (type === 'heavy') {
                    this.hp *= 1.5;
                    outerHp = Math.ceil(outerHp * 1.5);
                    innerHp = Math.ceil(innerHp * 1.5);
                    this.shootTimer = 120; 
                } else if (type === 'rapid') {
                    this.hp *= 0.7;
                    outerHp = Math.max(1, Math.floor(outerHp * 0.8));
                    this.shootTimer = 30; 
                }

                this.maxShieldHp = outerHp; 
                this.shieldSegments = new Array(outerCount).fill(outerHp); 
                this.shieldRotation = 0;
                
                this.innerShieldRadius = 90;
                this.innerShieldSegments = [];
                if (innerCount > 0) {
                    this.innerShieldSegments = new Array(innerCount).fill(innerHp);
                }
                this.innerShieldRotation = 0;
                
                const angle = Math.random() * Math.PI * 2;
                let speed = 0.2 + Math.random() * 0.3;
                if (type === 'heavy') speed *= 0.5;
                if (type === 'rapid') speed *= 1.5;
                
                this.vel.x = Math.cos(angle) * speed;
                this.vel.y = Math.sin(angle) * speed;
            }
            
            update() {
                if (this.aggro && player && !player.dead) {
                    const dx = player.pos.x - this.pos.x;
                    const dy = player.pos.y - this.pos.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist > 250) { 
                        const angle = Math.atan2(dy, dx);
                        this.vel.x += Math.cos(angle) * 0.05; 
                        this.vel.y += Math.sin(angle) * 0.05;
                        const speed = this.vel.mag();
                        const maxSpeed = this.type === 'heavy' ? 1.5 : (this.type === 'rapid' ? 3.0 : 2.5);
                        if (speed > maxSpeed) this.vel.mult(maxSpeed/speed);
                    }
                } else {
                    this.vel.mult(0.99);
                }

                this.pos.add(this.vel);
                checkDespawn(this, 6000); 
                this.shieldRotation += 0.01;
                this.innerShieldRotation -= 0.015;

                if (this.hp <= 5 && Math.random() < 0.1) spawnSmoke(this.pos.x, this.pos.y, 1);

                if (player && !player.dead) {
                    let px = player.pos.x, py = player.pos.y;
                    const dx = px - this.pos.x;
                    const dy = py - this.pos.y;
                    const dist = Math.hypot(dx, dy);
                    this.angle = Math.atan2(dy, dx);
                    
                    this.turretAngle = Math.atan2(dy, dx);
                    
                    if (!(this instanceof Boss)) {
                        this.angle += 0.002;
                    }

                    if (dist < 1500) {
                        this.shootTimer--;
                        if (this.shootTimer <= 0) {
                            const shootAngle = this.turretAngle;
                            if (this.type === 'heavy') {
                                for(let i=-1; i<=1; i++) {
                                    const a = shootAngle + i * 0.15;
                                    const bx = this.pos.x + Math.cos(a) * 75;
                                    const by = this.pos.y + Math.sin(a) * 75;
                                    bullets.push(new Bullet(bx, by, a, true, 3, 8, 8, '#fa0'));
                                    spawnBarrelSmoke(bx, by, a);
                                }
                                playSound('heavy_shoot');
                                this.shootTimer = 120;
                            } else if (this.type === 'rapid') {
                                const spread = (Math.random() - 0.5) * 0.1;
                                const a = shootAngle + spread;
                                const bx = this.pos.x + Math.cos(a) * 75;
                                const by = this.pos.y + Math.sin(a) * 75;
                                bullets.push(new Bullet(bx, by, a, true, 1, 14, 3, '#0ff'));
                                spawnBarrelSmoke(bx, by, a);
                                playSound('rapid_shoot');
                                this.shootTimer = 20; 
                            } else {
                                const damage = 2;
                                // 3-sided star shooting pattern
                                for(let i=0; i<3; i++) {
                                    const a = this.angle + i * (Math.PI * 2 / 3);
                                    const bx = this.pos.x + Math.cos(a) * 70;
                                    const by = this.pos.y + Math.sin(a) * 70;
                                    bullets.push(new Bullet(bx, by, a, true, damage));
                                    spawnBarrelSmoke(bx, by, a);
                                }
                                playSound('shoot');
                                this.shootTimer = difficultyTier >= 2 ? 40 : 60; 
                            }
                        }
                    }
                }
            }
            draw(ctx) {
                if(this.dead) return;
                ctx.save();
                ctx.translate(this.pos.x, this.pos.y);
                if (this.hp <= 2) ctx.translate((Math.random()-0.5)*2, (Math.random()-0.5)*2);
                
                let shieldColor = '#0ff';
                if (this.type === 'heavy') shieldColor = '#fa0';
                if (this.type === 'rapid') shieldColor = '#08f';
                if (this instanceof Boss) shieldColor = '#f00';

                ctx.save();
                ctx.rotate(this.shieldRotation);
                ctx.lineWidth = 4;
                const segCount = this.shieldSegments.length; 
                const segAngle = (Math.PI * 2) / segCount;
                for(let i=0; i<segCount; i++) {
                    if (this.shieldSegments[i] > 0) {
                         ctx.strokeStyle = shieldColor;
                         ctx.globalAlpha = Math.min(1.0, this.shieldSegments[i] / (this.maxShieldHp * 0.5)); 
                         ctx.shadowBlur = 10;
                         ctx.shadowColor = shieldColor;
                         ctx.beginPath();
                         ctx.arc(0, 0, this.shieldRadius, i * segAngle + 0.05, (i+1) * segAngle - 0.05);
                         ctx.stroke();
                         ctx.globalAlpha = 1.0;
                         ctx.shadowBlur = 0;
                         ctx.globalAlpha = 1.0;
                    }
                }
                ctx.restore();

                if (this.innerShieldSegments.length > 0) {
                    ctx.save();
                    ctx.rotate(this.innerShieldRotation);
                    ctx.lineWidth = 3;
                    const innerCount = this.innerShieldSegments.length;
                    const innerAngle = (Math.PI * 2) / innerCount;
                    let innerColor = '#f0f';
                    if (this.type === 'heavy') innerColor = '#f44';
                    if (this.type === 'rapid') innerColor = '#88f';
                    for(let i=0; i<innerCount; i++) {
                        if (this.innerShieldSegments[i] > 0) {
                             ctx.strokeStyle = innerColor;
                             ctx.globalAlpha = Math.min(1.0, this.innerShieldSegments[i] / (this.maxShieldHp * 0.5));
                             ctx.shadowBlur = 8;
                             ctx.shadowColor = innerColor;
                             ctx.beginPath();
                             ctx.arc(0, 0, this.innerShieldRadius, i * innerAngle + 0.05, (i+1) * innerAngle - 0.05);
                             ctx.stroke();
                             ctx.shadowBlur = 0;
                             ctx.globalAlpha = 1.0;
                        }
                    }
                    ctx.restore();
                }

                ctx.lineWidth = 3;
                if (this instanceof Boss) {
                    ctx.save();
                    ctx.rotate(this.angle);
                    if (this.variant === 'dreadnought') {
                        ctx.fillStyle = '#100'; ctx.strokeStyle = '#f00';
                        ctx.beginPath();
                        ctx.moveTo(120, 0);
                        ctx.lineTo(-100, 70);
                        ctx.lineTo(-80, 0);
                        ctx.lineTo(-100, -70);
                        ctx.closePath();
                        ctx.fill(); ctx.stroke();
                        ctx.beginPath();
                        ctx.rect(-90, -20, 40, 40);
                        ctx.fillStyle = '#300';
                        ctx.fill(); ctx.stroke();
                    } else if (this.variant === 'swarm') {
                        ctx.fillStyle = '#210'; ctx.strokeStyle = '#f80';
                        ctx.beginPath();
                        ctx.rect(-100, -50, 200, 100);
                        ctx.fill(); ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(-80, 0); ctx.lineTo(80, 0);
                        ctx.strokeStyle = '#ff0'; ctx.setLineDash([10, 10]);
                        ctx.stroke(); ctx.setLineDash([]);
                    } else {
                        ctx.fillStyle = '#111'; ctx.strokeStyle = '#f0f';
                        ctx.beginPath(); ctx.arc(0,0, 100, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                        ctx.beginPath(); ctx.arc(0,0, 100, 0, Math.PI*2); 
                        ctx.moveTo(-100, 0); ctx.lineTo(100, 0);
                        ctx.stroke();
                        ctx.beginPath(); ctx.arc(40, -40, 25, 0, Math.PI*2);
                        ctx.fillStyle = '#202'; ctx.fill(); ctx.stroke();
                    }
                    ctx.restore();
                } 
                else if (this.type === 'heavy') {
                    // Heavy "Fortress" style
                    ctx.save();
                    ctx.rotate(this.angle);
                    ctx.fillStyle = '#332'; ctx.strokeStyle = '#b80';
                    ctx.shadowBlur = 10; ctx.shadowColor = '#520';
                    
                    // Blocky Hull
                    ctx.beginPath();
                    ctx.rect(-50, -50, 100, 100);
                    ctx.fill(); ctx.stroke();
                    
                    // Industrial details
                    ctx.fillStyle = '#221';
                    ctx.fillRect(-40, -40, 30, 30);
                    ctx.fillRect(10, 10, 30, 30);
                    ctx.fillRect(-40, 10, 30, 30);
                    ctx.fillRect(10, -40, 30, 30);
                    
                    ctx.restore();

                    // Heavy Turrets
                    ctx.save();
                    ctx.rotate(this.turretAngle);
                    ctx.fillStyle = '#443'; ctx.strokeStyle = '#fa0';
                    
                    // Main dual cannon
                    ctx.beginPath();
                    ctx.rect(-25, -20, 50, 40);
                    ctx.fill(); ctx.stroke();

                    ctx.fillStyle = '#110';
                    ctx.fillRect(25, -12, 35, 8);
                    ctx.fillRect(25, 4, 35, 8);
                    
                    ctx.restore();
                } 
                else if (this.type === 'rapid') {
                    // Rapid "Relay" style
                    ctx.save();
                    ctx.rotate(this.angle);
                    ctx.fillStyle = '#234'; ctx.strokeStyle = '#0ff';
                    ctx.shadowBlur = 10; ctx.shadowColor = '#0cf';

                    // Tech shape
                    ctx.beginPath();
                    for(let i=0; i<3; i++) {
                        const a = i * Math.PI*2/3;
                        ctx.lineTo(Math.cos(a)*60, Math.sin(a)*60);
                        ctx.lineTo(Math.cos(a+0.5)*20, Math.sin(a+0.5)*20);
                    }
                    ctx.closePath();
                    ctx.fill(); ctx.stroke();

                    ctx.restore();
                    
                    // Rapid Turret
                    ctx.save();
                    ctx.rotate(this.turretAngle);
                    ctx.fillStyle = '#345'; ctx.strokeStyle = '#0ff';
                    ctx.beginPath();
                    ctx.arc(0, 0, 15, 0, Math.PI*2);
                    ctx.fill(); ctx.stroke();
                    ctx.fillStyle = '#088';
                    ctx.fillRect(10, -4, 25, 8);
                    ctx.restore();
                } 
                else {
                    // Standard "Star" style
                    ctx.save();
                    ctx.rotate(this.angle);
                    ctx.fillStyle = '#202'; ctx.strokeStyle = '#f0f';
                    ctx.shadowBlur = 10; ctx.shadowColor = '#f0f';
                    ctx.lineWidth = 3;

                    ctx.beginPath();
                    for (let i = 0; i < 3; i++) {
                        const a = i * Math.PI * 2 / 3;
                        const x = Math.cos(a) * 70;
                        const y = Math.sin(a) * 70;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                        
                        // Inner point
                        const a2 = a + Math.PI / 3;
                        ctx.lineTo(Math.cos(a2) * 20, Math.sin(a2) * 20);
                    }
                    ctx.closePath();
                    ctx.fill(); ctx.stroke();
                    
                    // Center detail
                    ctx.fillStyle = '#f0f';
                    ctx.beginPath();
                    ctx.arc(0, 0, 15, 0, Math.PI*2);
                    ctx.fill();

                    ctx.restore();
                }

                if (this.hp < 10) {
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.beginPath();
                    const damage = 10 - this.hp;
                    for(let i=0; i<damage*3; i++) {
                         const x1 = (Math.random()-0.5)*this.radius*1.2;
                         const y1 = (Math.random()-0.5)*this.radius*1.2;
                         const x2 = x1 + (Math.random()-0.5)*20;
                         const y2 = y1 + (Math.random()-0.5)*20;
                         ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
                    }
                    ctx.stroke();
                }

                ctx.restore();
            }
        }
        
        class SpaceNugget extends Entity {
            constructor(x, y, value = 1) {
                super(x, y);
                this.value = value;
                this.radius = 10;
                this.vel.x = (Math.random() - 0.5) * 0.6;
                this.vel.y = (Math.random() - 0.5) * 0.6;
                this.magnetized = false;
                this.flash = 0;
            }
            
            update() {
                if (!player || player.dead) return;
                const dist = Math.hypot(player.pos.x - this.pos.x, player.pos.y - this.pos.y);
                if (dist < player.magnetRadius) this.magnetized = true;
                
                if (this.magnetized) {
                    const angle = Math.atan2(player.pos.y - this.pos.y, player.pos.x - this.pos.x);
                    const speed = 11 + (900/Math.max(10, dist));
                    this.vel.x = Math.cos(angle) * speed;
                    this.vel.y = Math.sin(angle) * speed;
                } else {
                    this.vel.mult(0.98);
                }
                
                this.pos.add(this.vel);
                this.flash++;
            }
            
            draw(ctx) {
                ctx.save();
                ctx.translate(this.pos.x, this.pos.y);
                const scale = 1.0 + Math.sin(this.flash * 0.12) * 0.25;
                ctx.scale(scale, scale);
                ctx.rotate(Math.PI / 6);
                
                const gradient = ctx.createLinearGradient(-10, -10, 10, 10);
                gradient.addColorStop(0, '#ff0');
                gradient.addColorStop(0.5, '#f90');
                gradient.addColorStop(1, '#0ff');
                
                ctx.fillStyle = gradient;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = (Math.PI / 3) * i;
                    const x = Math.cos(angle) * 8;
                    const y = Math.sin(angle) * 8;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            }
        }

        class Boss extends Base {
            constructor(variant) {
                super(0, 0, 'standard');
                const angle = Math.random() * Math.PI * 2;
                const dist = 3000;
                this.pos.x = player.pos.x + Math.cos(angle) * dist;
                this.pos.y = player.pos.y + Math.sin(angle) * dist;
                
                this.variant = variant;
                this.radius = 120;
                this.hp = (25 + (difficultyTier * 25)) * 0.5 * 1.25;
                this.shootTimer = 60;
                this.shieldRadius = 180;
                this.innerShieldRadius = 150;
                this.aggro = true; 
                
                const shieldStrength = Math.max(1, Math.floor(((2 + Math.floor(difficultyTier * 0.6)) * 0.5) * 1.25));
                this.maxShieldHp = shieldStrength;
                this.shieldSegments = new Array(24).fill(shieldStrength);
                this.innerShieldSegments = new Array(16).fill(shieldStrength);
                this.vel.x = 0;
                this.vel.y = 0;
            }
            
            kill() {
                this.dead = true;
                playSound('base_explode');
                spawnParticles(this.pos.x, this.pos.y, 100, '#f00');
                // Massive coin drop
                for(let i=0; i<13; i++) {
                    coins.push(new Coin(this.pos.x + (Math.random()-0.5)*100, this.pos.y + (Math.random()-0.5)*100, 10));
                }
                for(let i=0; i<5; i++) {
                    nuggets.push(new SpaceNugget(this.pos.x + (Math.random()-0.5)*120, this.pos.y + (Math.random()-0.5)*120, 1));
                }
                
                powerups.push(new HealthPowerUp(this.pos.x, this.pos.y));
                bossActive = false;
                bossArena.active = false;
                showOverlayMessage("TARGET DESTROYED - ARENA UNLOCKED", '#0f0', 3000);
                // If this was a dreadnought, start the spawn timer for the next dreadnought
                // Reset timer for ANY boss death to prevent back-to-back spawns
                try {
                    if (this.variant === 'dreadnought' || dreadManager.firstSpawnDone || dreadManager.timerActive) {
                        const delay = dreadManager.minDelayMs + Math.floor(Math.random() * (dreadManager.maxDelayMs - dreadManager.minDelayMs + 1));
                        dreadManager.timerAt = Date.now() + delay;
                        dreadManager.timerActive = true;
                    }
                } catch (e) { console.warn('failed to start dread timer', e); }

                boss = null;
            }

            update() {
                if (player && !player.dead) {
                    const dx = player.pos.x - this.pos.x;
                    const dy = player.pos.y - this.pos.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist > 300) {
                        const angle = Math.atan2(dy, dx);
                        this.vel.x += Math.cos(angle) * 0.03;
                        this.vel.y += Math.sin(angle) * 0.03;
                        const speed = this.vel.mag();
                        if (speed > 2.0) this.vel.mult(2.0/speed);
                    }
                    const desiredAngle = Math.atan2(dy, dx);
                    let diff = desiredAngle - this.angle;
                    while(diff > Math.PI) diff -= Math.PI*2;
                    while(diff < -Math.PI) diff += Math.PI*2;
                    this.angle += Math.sign(diff) * 0.005;
                }
                
                super.update();
                if (player && !player.dead && this.shootTimer <= 0) {
                    const aimAngle = this.angle;
                    if (this.variant === 'dreadnought') {
                        for(let i=-1; i<=1; i+=2) {
                             const a = aimAngle + i * 0.2;
                             const bx = this.pos.x + Math.cos(a) * 130;
                             const by = this.pos.y + Math.sin(a) * 130;
                             bullets.push(new Bullet(bx, by, a, true, 5, 12, 12, '#f00'));
                             spawnBarrelSmoke(bx, by, a);
                        }
                        playSound('heavy_shoot');
                        this.shootTimer = 40;
                    } else if (this.variant === 'swarm') {
                        for(let i=0; i<3; i++) {
                             const a = aimAngle + (Math.random()-0.5);
                             const bx = this.pos.x + Math.cos(a) * 100;
                             const by = this.pos.y + Math.sin(a) * 100;
                             enemies.push(new Enemy('roamer', {x:bx, y:by}));
                        }
                        this.shootTimer = 180; 
                    } else {
                        for(let i=0; i<16; i++) {
                             const a = this.shieldRotation + (i * Math.PI*2/16);
                             const bx = this.pos.x + Math.cos(a) * 120;
                             const by = this.pos.y + Math.sin(a) * 120;
                             bullets.push(new Bullet(bx, by, a, true, 2, 8, 5, '#f0f'));
                        }
                        playSound('rapid_shoot');
                        this.shootTimer = 30;
                    }
                }
            }
        }
//space station class
        class SpaceStation extends Entity {
            // Initialize the Space Station with massive health and shields
            constructor() {
                const angle = Math.random() * Math.PI * 2;
                const dist = 6000; // Spawn far away from player
                super(player.pos.x + Math.cos(angle) * dist, player.pos.y + Math.sin(angle) * dist);
                
                this.radius = 520; // Larger collision radius
                this.hp = 180;
                this.maxHp = 180;
                
                // Two layers of shields
                this.shieldRadius = 570;
                this.innerShieldRadius = 520;
                
                // High segment count for "boss" feel
                this.shieldSegments = new Array(72).fill(5);
                this.innerShieldSegments = new Array(64).fill(5);
                
                this.shieldRotation = 0;
                this.innerShieldRotation = 0;
                
                this.turretReload = 12;
                this.defenderSpawnTimer = 0;
            }
            
            update() {
                // Rotate shields in opposite directions for visual effect
                this.shieldRotation += 0.003;
                this.innerShieldRotation -= 0.0045;
                
                // Check if player is within range to engage
                if (player && !player.dead) {
                    const dist = Math.hypot(player.pos.x - this.pos.x, player.pos.y - this.pos.y);
                    if (dist < 2800) { // Engagement range reduced by 20%
                        this.turretReload--;
                        if (this.turretReload <= 0) {
                            this.fireTurrets();
                            this.turretReload = 15; // Rapid fire
                        }
                        this.manageDefenders();
                    }
                }
            }
            
            manageDefenders() {
                const myDefenders = enemies.filter(e => e.assignedBase === this && !e.dead);
                if (myDefenders.length < 8) {
                    if (this.defenderSpawnTimer <= 0) {
                        const angle = Math.random() * Math.PI * 2;
                        const d = this.radius + 70;
                        const sx = this.pos.x + Math.cos(angle) * d;
                        const sy = this.pos.y + Math.sin(angle) * d;
                        enemies.push(new Enemy('defender', {x: sx, y: sy}, this));
                        spawnParticles(sx, sy, 15, '#0f0');
                        this.defenderSpawnTimer = 45;
                    } else {
                        this.defenderSpawnTimer--;
                    }
                }
            }

            // Fires 8 turrets mounted on the shield ring
            fireTurrets() {
                const offsets = [0, Math.PI/4, Math.PI/2, 3*Math.PI/4, Math.PI, 5*Math.PI/4, 3*Math.PI/2, 7*Math.PI/4];
                for(let i=0; i<offsets.length; i++) {
                    // Calculate turret position based on current rotation
                    const angleOffset = offsets[i] + this.shieldRotation;
                    const tx = this.pos.x + Math.cos(angleOffset) * (this.radius * 0.75);
                    const ty = this.pos.y + Math.sin(angleOffset) * (this.radius * 0.75);
                    
                    // Aim at player
                    const angle = Math.atan2(player.pos.y - ty, player.pos.x - tx);
                    
                    // Rapid fire bullets
                    const b = new Bullet(tx, ty, angle, true, 3, 16, 5, '#ff0');
                    b.life *= 1.04; // ~20% less range
                    bullets.push(b);
                    spawnBarrelSmoke(tx, ty, angle);
                }
                playSound('rapid_shoot');
            }
            
            draw(ctx) {
                ctx.save();
                ctx.translate(this.pos.x, this.pos.y);
                
                // --- 1. Rotating Outer Ring Structure ---
                ctx.save();
                ctx.rotate(this.shieldRotation * 0.5);
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 20;
                ctx.beginPath();
                const ringRad = this.radius - 30;
                ctx.arc(0, 0, ringRad, 0, Math.PI*2);
                ctx.stroke();
                
                // Mechanical Teeth/Docking Ports
                ctx.fillStyle = '#222';
                ctx.strokeStyle = '#555';
                ctx.lineWidth = 2;
                const teeth = 12;
                for(let i=0; i<teeth; i++) {
                    const a = (i / teeth) * Math.PI * 2;
                    const tx = Math.cos(a) * ringRad;
                    const ty = Math.sin(a) * ringRad;
                    ctx.save();
                    ctx.translate(tx, ty);
                    ctx.rotate(a);
                    ctx.beginPath();
                    ctx.rect(-15, -25, 30, 50);
                    ctx.fill();
                    ctx.stroke();
                    // Small light
                    ctx.fillStyle = i % 2 === 0 ? '#f00' : '#ff0';
                    ctx.beginPath();
                    ctx.arc(0, 0, 4, 0, Math.PI*2);
                    ctx.fill();
                    ctx.restore();
                }
                ctx.restore();

                // --- 2. Main Hull Body ---
                ctx.fillStyle = '#111';
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 5;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#0ff';
                
                ctx.beginPath();
                ctx.arc(0, 0, this.radius * 0.75, 0, Math.PI*2);
                ctx.fill();
                ctx.stroke();
                ctx.shadowBlur = 0; 

                // --- 3. Tech Patterning ---
                ctx.strokeStyle = 'rgba(0, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius * 0.5, 0, Math.PI*2);
                ctx.stroke();
                
                // Radial lines
                for(let i=0; i<8; i++) {
                    const a = i * (Math.PI / 4);
                    ctx.beginPath();
                    ctx.moveTo(Math.cos(a) * this.radius * 0.25, Math.sin(a) * this.radius * 0.25);
                    ctx.lineTo(Math.cos(a) * this.radius * 0.75, Math.sin(a) * this.radius * 0.75);
                    ctx.stroke();
                }

                // --- 4. Central Reactor Core ---
                const pulse = 1.0 + Math.sin(Date.now() * 0.005) * 0.15;
                
                // Core housing
                ctx.fillStyle = '#000';
                ctx.strokeStyle = '#f0f';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius * 0.25, 0, Math.PI*2);
                ctx.fill();
                ctx.stroke();
                
                // Glowing center
                ctx.fillStyle = '#f0f';
                ctx.shadowBlur = 30 * pulse;
                ctx.shadowColor = '#f0f';
                ctx.beginPath();
                ctx.arc(0, 0, this.radius * 0.15 * pulse, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // --- 5. Turrets (High Tech) ---
                const offsets = [0, Math.PI/2, Math.PI, 3*Math.PI/2];
                for(let i=0; i<4; i++) {
                    const angleOffset = offsets[i] + this.shieldRotation;
                    // Mount on the main hull rim
                    const tx = Math.cos(angleOffset) * (this.radius * 0.75);
                    const ty = Math.sin(angleOffset) * (this.radius * 0.75);
                    
                    ctx.save();
                    ctx.translate(tx, ty);
                    let aim = angleOffset;
                    if (player && !player.dead) {
                         aim = Math.atan2(player.pos.y - (this.pos.y + ty), player.pos.x - (this.pos.x + tx));
                    }
                    ctx.rotate(aim);
                    
                    // Base
                    ctx.fillStyle = '#333';
                    ctx.strokeStyle = '#888';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 22, 0, Math.PI*2);
                    ctx.fill();
                    ctx.stroke();
                    
                    // Barrels (Twin Heavy)
                    ctx.fillStyle = '#f44';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#f00';
                    ctx.fillRect(10, -12, 40, 8);
                    ctx.fillRect(10, 4, 40, 8);
                    ctx.shadowBlur = 0;
                    
                    // Center pivot
                    ctx.fillStyle = '#aaa';
                    ctx.beginPath();
                    ctx.arc(0, 0, 10, 0, Math.PI*2);
                    ctx.fill();
                    
                    ctx.restore();
                }

                // --- 6. Shields ---
                const drawShieldRing = (segments, radius, rotation, color) => {
                    ctx.save();
                    ctx.rotate(rotation);
                    ctx.lineWidth = 8;
                    const count = segments.length;
                    const arcLen = (Math.PI * 2) / count;
                    for(let i=0; i<count; i++) {
                        if (segments[i] > 0) {
                            ctx.strokeStyle = color;
                            // Pulse alpha for "energy" feel
                            const energyPulse = 0.6 + Math.sin(Date.now() * 0.008 + i) * 0.3;
                            ctx.globalAlpha = Math.min(1, (segments[i] / 2) * energyPulse); 
                            ctx.shadowBlur = 15;
                            ctx.shadowColor = color;
                            ctx.beginPath();
                            ctx.arc(0, 0, radius, i*arcLen + 0.02, (i+1)*arcLen - 0.02);
                            ctx.stroke();
                        }
                    }
                    ctx.restore();
                };

                drawShieldRing(this.shieldSegments, this.shieldRadius, this.shieldRotation, '#0ff');
                drawShieldRing(this.innerShieldSegments, this.innerShieldRadius, this.innerShieldRotation, '#f0f');

                ctx.restore();
            }
        }

        function compactArray(arr) {
            let alive = 0;
            for (let i = 0; i < arr.length; i++) {
                if (!arr[i].dead) {
                    arr[alive++] = arr[i];
                }
            }
            arr.length = alive;
        }

        function spawnParticles(x, y, count = 10, color = '#fff') {
            for(let i=0; i<count; i++) particles.push(new Particle(x, y, null, null, color));
        }

        function spawnSmoke(x, y, count = 1) {
            for(let i=0; i<count; i++) particles.push(new SmokeParticle(x, y));
        }

        function spawnBarrelSmoke(x, y, angle) {
            for(let i=0; i<3; i++) {
                const speed = 2 + Math.random() * 2;
                const spread = (Math.random()-0.5) * 0.5;
                const vx = Math.cos(angle + spread) * speed;
                const vy = Math.sin(angle + spread) * speed;
                particles.push(new SmokeParticle(x, y, vx, vy));
            }
        }
        
        function scheduleNextShootingStar() {

        function findSpawnPointRelative(random = false) {
             if (!player) return {x:0, y:0};
             const angle = Math.random() * Math.PI * 2;
             const dist = 1500 + Math.random() * 1000;
             const x = player.pos.x + Math.cos(angle) * dist;
             const y = player.pos.y + Math.sin(angle) * dist;
             return {x, y};
        }

        function resolveEntityCollision() {
            const allEntities = [player, ...enemies, ...bases].filter(e => e && !e.dead);
            if (boss && !boss.dead) allEntities.push(boss);
            if (spaceStation) allEntities.push(spaceStation);
            
            // Push physics
            for (let i = 0; i < allEntities.length; i++) {
                for (let j = i + 1; j < allEntities.length; j++) {
                    const e1 = allEntities[i];
                    const e2 = allEntities[j];
                    let r1 = e1.radius;
                    let r2 = e2.radius;
                    
                    const isStatic1 = (e1 instanceof Base) || (e1 instanceof SpaceStation);
                    const isStatic2 = (e2 instanceof Base) || (e2 instanceof SpaceStation);

                    if (isStatic1 && e1.shieldSegments.some(s=>s>0)) r1 = e1.shieldRadius;
                    if (isStatic2 && e2.shieldSegments.some(s=>s>0)) r2 = e2.shieldRadius;
                    
                    const dx = e2.pos.x - e1.pos.x;
                    const dy = e2.pos.y - e1.pos.y;
                    const distSq = dx*dx + dy*dy;
                    const minDist = r1 + r2;
                    if (distSq < minDist * minDist && distSq > 0.001) {
                        const dist = Math.sqrt(distSq);
                        const overlap = minDist - dist;
                        const nx = dx / dist;
                        const ny = dy / dist;
                        const push = overlap * 0.5;
                        
                        if (isStatic1) { e2.pos.x += nx * overlap; e2.pos.y += ny * overlap; }
                        else if (isStatic2) { e1.pos.x -= nx * overlap; e1.pos.y -= ny * overlap; }
                        else { 
                            e1.pos.x -= nx * push; e1.pos.y -= ny * push; 
                            e2.pos.x += nx * push; e2.pos.y += ny * push; 
                        }

                        if (e1 instanceof Base) e1.aggro = true;
                        if (e2 instanceof Base) e2.aggro = true;
                    }
                }
            }
            
            // Collision & Damage
            const damageable = [player, ...enemies];
            for (let entity of damageable) {
                if (entity.dead) continue;
                const nearbyAsteroids = asteroidGrid.query(entity.pos.x, entity.pos.y);
                for (let ast of nearbyAsteroids) {
                    if (ast.dead) continue;
                    const dx = entity.pos.x - ast.pos.x;
                    const dy = entity.pos.y - ast.pos.y;
                    const distSq = dx*dx + dy*dy;
                    const minDist = entity.radius + ast.radius;
                    
                    if (distSq < minDist * minDist) {
                        const dist = Math.sqrt(distSq);
                        const overlap = minDist - dist;
                        const nx = dx / dist;
                        const ny = dy / dist;
                        entity.pos.x += nx * overlap;
                        entity.pos.y += ny * overlap;
                        entity.vel.x += nx * 1;
                        entity.vel.y += ny * 1;
                        
                        if (entity === player) {
                            if (Date.now() - player.lastAsteroidHitTime > 1000) {
                                // Invincibility check from upgrade
                                if (player.invincibilityOnHit > 0) {
                                    // Trigger invuln? For now simpler logic: Just standard shield hit
                                }
                                
                                let shieldAbsorbed = false;
                                const activeSeg = player.shieldSegments.findIndex(s => s > 0);
                                if (activeSeg !== -1) {
                                    player.shieldSegments[activeSeg]--;
                                    playSound('shield_hit');
                                    spawnParticles(player.pos.x, player.pos.y, 5, '#0ff');
                                    shieldAbsorbed = true;
                                }

                                if (!shieldAbsorbed && player.invulnerable <= 0) {
                                    const asteroidDamage = sectorIndex >= 2 ? 2 : 1;
                                    player.hp -= asteroidDamage;
                                    player.invulnerable = 60; 
                                    playSound('hit');
                                    spawnParticles(player.pos.x, player.pos.y, 5, '#f00');
                                    updateHealthUI();
                                    if (player.hp <= 0) killPlayer();
                                }
                                
                                player.lastAsteroidHitTime = Date.now();
                                ast.break();
                                spawnParticles(ast.pos.x, ast.pos.y, 8, '#aa8');
                                playSound('hit'); 
                            }
                        } 
                    }
                }
            }
            
            // Coin Collection
            if (player && !player.dead) {
                // Player rams into roamers/defenders: destroy them, take damage equal to remaining HP
                for (let e of enemies) {
                    if (e.dead) continue;
                    if (e.type === 'roamer' || e.type === 'elite_roamer' || e.type === 'hunter' || e.type === 'defender') {
                        const dist = Math.hypot(player.pos.x - e.pos.x, player.pos.y - e.pos.y);
                        if (dist < player.radius + e.radius) {
                            // If invincible, no one takes damage and both survive
                            if (player.invulnerable > 0) continue;

                            const ramDamage = Math.max(0, Math.ceil(e.hp));
                            // Larger, colorful burst on impact
                            spawnParticles(e.pos.x, e.pos.y, 20, '#f44');
                            spawnParticles(e.pos.x, e.pos.y, 15, '#ff0');
                            spawnParticles(e.pos.x, e.pos.y, 10, '#0ff');
                            e.kill();
                            playSound('hit');

                            let remaining = ramDamage;
                            // Shields absorb first
                            for (let i = 0; i < player.shieldSegments.length && remaining > 0; i++) {
                                const absorb = Math.min(remaining, player.shieldSegments[i]);
                                player.shieldSegments[i] -= absorb;
                                remaining -= absorb;
                            }
                            if (remaining > 0) {
                                player.hp -= remaining;
                                player.invulnerable = 60; // brief i-frames to prevent instant double hits
                                spawnParticles(player.pos.x, player.pos.y, 8, '#f00');
                                updateHealthUI();
                                if (player.hp <= 0) {
                                    killPlayer();
                                    break;
                                }
                            } else {
                                // Optional light shield hit effect
                                spawnParticles(player.pos.x, player.pos.y, 5, '#0ff');
                            }
                        }
                    }
                }

                for (let c of coins) {
                    if (c.dead) continue;
                    const dist = Math.hypot(player.pos.x - c.pos.x, player.pos.y - c.pos.y);
                    if (dist < player.radius + c.radius) {
                        // Collect
                        playSound('coin');
                        score += c.value;
                        player.addXp(c.value);
                        c.dead = true;
                    }
                }
                
                for (let n of nuggets) {
                    if (n.dead) continue;
                    const dist = Math.hypot(player.pos.x - n.pos.x, player.pos.y - n.pos.y);
                    if (dist < player.radius + n.radius) {
                        playSound('coin');
                        spaceNuggets += n.value;
                        updateNuggetUI();
                        n.dead = true;
                    }
                }
                
                for (let p of powerups) {
                    if (p.dead) continue;
                    const dist = Math.hypot(player.pos.x - p.pos.x, player.pos.y - p.pos.y);
                    if (dist < player.radius + p.radius) {
                        playSound('powerup');
                        player.hp = Math.min(player.hp + 10, player.maxHp);
                        updateHealthUI();
                        showOverlayMessage("HEALTH RESTORED", '#0f0', 1000);
                        p.dead = true;
                    }
                }
            }
            
            // Shooting Star Collisions
            for (let s of shootingStars) {
                if (s.dead) continue;
                
                // Vs Player
                if (player && !player.dead && !player.invulnerable) {
                    const dist = Math.hypot(s.pos.x - player.pos.x, s.pos.y - player.pos.y);
                    if (dist < s.radius + player.radius) {
                        player.hp -= s.damage;
                        updateHealthUI();
                        playSound('explode');
                        spawnParticles(player.pos.x, player.pos.y, 20, '#f00');
                        showOverlayMessage("HIT BY SHOOTING STAR!", '#f00', 2000);
                        s.dead = true;
                        if (player.hp <= 0) killPlayer();
                        continue;
                    }
                }
                
                // Vs Asteroids
                const nearby = asteroidGrid.query(s.pos.x, s.pos.y);
                for (let ast of nearby) {
                    if (ast.dead) continue;
                    const dist = Math.hypot(s.pos.x - ast.pos.x, s.pos.y - ast.pos.y);
                    if (dist < s.radius + ast.radius) {
                        ast.break();
                        spawnParticles(ast.pos.x, ast.pos.y, 10, '#fa0');
                        playSound('hit');
                        // Star keeps going (pierces)
                    }
                }
            }
        }

        function checkWallCollision(entity, elasticity = 0) {
            // Arena barrier only affects the player (enemies are exempt)
            if (bossArena.active && entity instanceof Enemy) return;
            if (bossArena.active) {
                const dx = entity.pos.x - bossArena.x;
                const dy = entity.pos.y - bossArena.y;
                const dist = Math.hypot(dx, dy);
                if (dist > bossArena.radius) {
                    // Player Damage Logic
                    if (entity === player) {
                        if (Date.now() - player.lastArenaDamageTime > 1000) {
                             if (player.invulnerable <= 0) {
                                 player.hp -= 1;
                                 playSound('hit');
                                 updateHealthUI();
                                 spawnParticles(player.pos.x, player.pos.y, 5, '#f00');
                                 showOverlayMessage("WARNING: ARENA WALL DAMAGE", '#f00', 1000);
                                 if (player.hp <= 0) killPlayer();
                             }
                             player.lastArenaDamageTime = Date.now();
                        }
                    }

                    const angle = Math.atan2(dy, dx);
                    entity.pos.x = bossArena.x + Math.cos(angle) * bossArena.radius;
                    entity.pos.y = bossArena.y + Math.sin(angle) * bossArena.radius;
                    
                    const nx = Math.cos(angle);
                    const ny = Math.sin(angle);
                    const dot = entity.vel.x * nx + entity.vel.y * ny;
                    
                    if (dot > 0) {
                        entity.vel.x -= nx * dot * (1 + elasticity);
                        entity.vel.y -= ny * dot * (1 + elasticity);
                    }
                }
            }
        }
        
        function checkBulletWallCollision(bullet) {
             const nearby = asteroidGrid.query(bullet.pos.x, bullet.pos.y);
             for(let ast of nearby) {
                 if (ast.dead) continue;
                 const dx = bullet.pos.x - ast.pos.x;
                 const dy = bullet.pos.y - ast.pos.y;
                 const distSq = dx*dx + dy*dy;
                 const rad = ast.radius + bullet.radius;
                 if (distSq < rad * rad) {
                     return {hit: true, obj: ast};
                 }
             }
             return {hit: false};
        }

        function formatTime(ms) {
            const totalSec = Math.floor(ms / 1000);
            const hh = Math.floor(totalSec / 3600);
            const mm = Math.floor((totalSec % 3600) / 60);
            const ss = totalSec % 60;
            return hh > 0 ? `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}` : `${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
        }

        function spawnNewBaseRelative(initial = false) {
            if (!player) return;
            const availableTypes = ['standard'];
            if (difficultyTier >= 2) availableTypes.push('rapid');
            if (difficultyTier >= 3) availableTypes.push('heavy');
            
            const type = availableTypes[Math.floor(Math.random() * availableTypes.length)];
            let angle;
            if (initial) {
                angle = Math.random() * Math.PI * 2;
            } else {
                let baseAngle = player.angle;
                if (player.vel.mag() > 1) baseAngle = Math.atan2(player.vel.y, player.vel.x);
                angle = baseAngle + (Math.random() - 0.5) * (Math.PI / 2);
            }

            const dist = initial ? (1000 + Math.random() * 2000) : (3500 + Math.random() * 1500);
            const bx = player.pos.x + Math.cos(angle) * dist;
            const by = player.pos.y + Math.sin(angle) * dist;
            
            const b = new Base(bx, by, type);
            bases.push(b);
            for(let i=0; i<2; i++) {
                const da = Math.random() * Math.PI * 2;
                const defX = b.pos.x + Math.cos(da) * 150;
                const defY = b.pos.y + Math.sin(da) * 150;
                enemies.push(new Enemy('defender', {x: defX, y: defY}, b));
            }
        }
