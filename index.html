        function showLevelUpMenu() {
            const container = document.getElementById('upgrade-container');
            container.innerHTML = '';
            
            // 1. Filter Valid Upgrades
            const validUpgrades = [];
            UPGRADE_DATA.categories.forEach(cat => {
                cat.upgrades.forEach(up => {
                    const currentTier = player.inventory[up.id] || 0;
                    if (currentTier < 3) {
                        validUpgrades.push({ ...up, category: cat.name });
                    }
                });
            });
            
            // 2. Pick 3 Random
            const choices = [];
            const count = Math.min(3, validUpgrades.length);
            for(let i=0; i<count; i++) {
                const idx = Math.floor(Math.random() * validUpgrades.length);
                choices.push(validUpgrades[idx]);
                validUpgrades.splice(idx, 1);
            }
            
            // 3. Create DOM
            choices.forEach(choice => {
                const currentTier = player.inventory[choice.id] || 0;
                const nextTier = currentTier + 1;
                const desc = choice[`tier${nextTier}`];
                
                const card = document.createElement('div');
                card.className = 'upgrade-card';
                card.innerHTML = `
                    <div class="upgrade-title">${choice.name}</div>
                    <div style="color:#aaa; font-size:12px; margin-bottom:10px">${choice.category}</div>
                    <div class="upgrade-desc">${desc}</div>
                    <div style="font-size:12px; color:#888; margin-top:10px">${choice.notes}</div>
                    <div class="upgrade-tier">Tier ${nextTier}</div>
                `;
                
                card.onclick = () => {
                    applyUpgrade(choice.id, nextTier);
                    document.getElementById('levelup-screen').style.display = 'none';
                    gameActive = true;
                    // Resume logic
                    if (musicEnabled) startMusic();
                };
                container.appendChild(card);
            });
            
            document.getElementById('levelup-screen').style.display = 'flex';
            stopMusic(); // Pause music during choice

            // Restore 3 HP whenever the upgrade/level-up menu appears
            try {
                if (player && !player.dead) {
                    player.hp = Math.min(player.hp + 3, player.maxHp);
                    updateHealthUI();
                    playSound('powerup');
                }
            } catch(e) { console.warn('heal on levelup failed', e); }
            
            // Reset selection for gamepad
            menuSelectionIndex = 0;
            const cards = getActiveMenuElements();
            if (cards.length > 0) updateMenuVisuals(cards);
        }
        
        function applyUpgrade(id, tier) {
            player.inventory[id] = tier;

            // Track upgrades for dreadnought first-spawn logic
            try {
                dreadManager.upgradesChosen = (dreadManager.upgradesChosen || 0) + 1;
                // On the 3rd chosen upgrade, schedule the first dreadnought to spawn after 10s
                if (!dreadManager.firstSpawnDone && dreadManager.upgradesChosen >= 3 && !bossActive && !dreadManager.timerActive) {
                    dreadManager.timerAt = Date.now() + 10000; // 10 seconds
                    dreadManager.timerActive = true;
                    // Inform player a dreadnought is incoming
                    showOverlayMessage("WARNING: DREADNOUGHT INCOMING IN 10s", '#f00', 3000);
                }
            } catch(e) { console.warn('dreadManager upgrade increment failed', e); }
            
            // Logic Map
            switch(id) {
                case 'turret_damage':
                    if (tier === 1) player.stats.damageMult += 0.2;
                    if (tier === 2) player.stats.damageMult = 1.4; // +40% total
                    if (tier === 3) player.stats.damageMult = 1.7; // +70% total
                    break;
                case 'turret_fire_rate':
                    if (tier === 1) player.stats.fireRateMult = 1.15;
                    if (tier === 2) player.stats.fireRateMult = 1.30;
                    if (tier === 3) player.stats.fireRateMult = 1.50;
                    break;
                case 'turret_range':
                    if (tier === 1) player.stats.rangeMult = 1.25;
                    if (tier === 2) player.stats.rangeMult = 1.50;
                    if (tier === 3) player.stats.rangeMult = 2.0;
                    break;
                case 'multi_shot':
                    player.stats.multiShot = tier + 1; // 2, 3, 4
                    break;
                case 'static_weapons':
                    // Add specific gun logic
                    if (tier === 1) player.staticWeapons.push({type: 'forward'});
                    if (tier === 2) player.staticWeapons.push({type: 'side'});
                    if (tier === 3) player.staticWeapons.push({type: 'rear'});
                    player.staticCannonCount = player.staticWeapons.length; // Vis only
                    break;
                case 'homing_missiles':
                    player.stats.homing = tier; // 1=weak, 2=strong, 3=perfect(implied by stronger turn rate)
                    break;
                case 'segment_count':
                    if (tier === 1) player.shieldSegments.push(2, 2); // 8+2=10
                    if (tier === 2) player.shieldSegments.push(2, 2, 2, 2); // 10+4=14
                    if (tier === 3) player.shieldSegments.push(2, 2, 2, 2); // 14+4=18
                    player.maxShieldSegments = player.shieldSegments.length;
                    break;
                case 'segment_hp':
                    // Just visual/math concept here, implemented as damage mitigation?
                    // For now, simpler: shield HP isn't tracked per segment > 1, so effectively just recharges faster implicitly or invuln time
                    break;
                case 'shield_regen':
                    if (tier === 1) player.stats.shieldRegenRate = 5;
                    if (tier === 2) player.stats.shieldRegenRate = 3;
                    if (tier === 3) player.stats.shieldRegenRate = 1;
                    break;
                case 'hull_strength':
                    player.maxHp += 25;
                    player.hp = Math.min(player.maxHp, player.hp + 25);
                    updateHealthUI();
                    break;
                case 'speed':
                    if (tier === 1) player.stats.speedMult = 1.15;
                    if (tier === 2) player.stats.speedMult = 1.30;
                    if (tier === 3) player.stats.speedMult = 1.50;
                    break;
                case 'xp_magnet':
                    if (tier === 1) player.magnetRadius = 300;
                    if (tier === 2) player.magnetRadius = 600;
                    if (tier === 3) player.magnetRadius = 1200;
                    break;
                case 'area_nuke':
                    player.nukeUnlocked = true;
                    player.nukeMaxCooldown = 600; // 10s
                    if (tier === 1) { player.nukeDamage = 5; player.nukeRange = 600; }
                    if (tier === 2) { player.nukeDamage = 10; player.nukeRange = 700; }
                    if (tier === 3) { player.nukeDamage = 15; player.nukeRange = 900; }
                    break;
                case 'invincibility':
                    player.invincibilityCycle.unlocked = true;
                    if (tier === 1) player.invincibilityCycle.stats = { duration: 180, cooldown: 1200, regen: false }; // 3s / 20s
                    if (tier === 2) player.invincibilityCycle.stats = { duration: 300, cooldown: 900, regen: false }; // 5s / 15s
                    if (tier === 3) player.invincibilityCycle.stats = { duration: 420, cooldown: 600, regen: true }; // 7s / 10s
                    player.invincibilityCycle.state = 'ready';
                    player.invincibilityCycle.timer = 0;
                    break;
                case 'slow_field':
                    if (tier === 1) { player.stats.slowField = 250; player.stats.slowFieldDuration = 180; }
                    if (tier === 2) { player.stats.slowField = 312; player.stats.slowFieldDuration = 300; }
                    if (tier === 3) { player.stats.slowField = 390; player.stats.slowFieldDuration = 480; }
                    break;
            }
            
            showOverlayMessage(`${id.replace('_', ' ').toUpperCase()} UPGRADED!`, '#ff0', 1500);
        }

        // --- Core Loop ---

        function updateGamepad() {
            const pads = navigator.getGamepads ? navigator.getGamepads() : [];
            const gp = pads[gamepadIndex];
            if (!gp) {
                for (let i = 0; i < pads.length; i++) {
                    if (pads[i]) { gamepadIndex = i; break; }
                }
                return;
            }

            const deadzone = 0.1;
            const applyDeadzone = (v) => Math.abs(v) < deadzone ? 0 : v;

            let gamepadInput = false;
            if (gp.axes.some(axis => Math.abs(axis) > deadzone) || gp.buttons.some(button => button.pressed)) {
                gamepadInput = true;
            }

            if (gamepadInput) {
                document.body.classList.add('no-cursor');
            }

            gpState.move.x = applyDeadzone(gp.axes[0]);
            gpState.move.y = applyDeadzone(gp.axes[1]);
            gpState.aim.x = applyDeadzone(gp.axes[2]);
            gpState.aim.y = applyDeadzone(gp.axes[3]);
            
            const now = Date.now();
            if (gp.buttons[9].pressed && !gpState.pausePressed) { // Start
                togglePause();
                gpState.pausePressed = true;
            } else if (!gp.buttons[9].pressed) {
                gpState.pausePressed = false;
            }

            gpState.warp = gp.buttons[0].pressed; 
            gpState.nuke = gp.buttons[2].pressed; // Button 2 (X/Square)
            
            // Menu Navigation Support
            if ((!gameActive || gamePaused) && now - menuDebounce > 150) {
                const activeElements = getActiveMenuElements();
                if (activeElements.length > 0) {
                    let change = 0;
                    
                    // Vertical (Up/Down) - Standard Menus
                    if (gp.axes[1] < -0.5 || gp.buttons[12].pressed) change = -1;
                    if (gp.axes[1] > 0.5 || gp.buttons[13].pressed) change = 1;
                    
                    // Horizontal (Left/Right) - Upgrade Cards
                    if (gp.axes[0] < -0.5 || gp.buttons[14].pressed) change = -1;
                    if (gp.axes[0] > 0.5 || gp.buttons[15].pressed) change = 1;

                    if (change !== 0) {
                         menuSelectionIndex += change;
                         if (menuSelectionIndex < 0) menuSelectionIndex = activeElements.length - 1;
                         if (menuSelectionIndex >= activeElements.length) menuSelectionIndex = 0;
                         updateMenuVisuals(activeElements);
                         menuDebounce = now;
                    }

                    // A Button / Cross - Select
                    if (gp.buttons[0].pressed) {
                        activeElements[menuSelectionIndex].click();
                        menuDebounce = now + 200; 
                    }
                }
            }
        }
        
        function getActiveMenuElements() {
            if (document.getElementById('start-screen').style.display !== 'none') {
                 return Array.from(document.querySelectorAll('#start-screen button'));
            }
            if (document.getElementById('pause-menu').style.display !== 'none') {
                 return Array.from(document.querySelectorAll('#pause-menu button'));
            }
            if (document.getElementById('levelup-screen').style.display !== 'none') {
                 return Array.from(document.querySelectorAll('.upgrade-card'));
            }
            return [];
        }
        
        function updateMenuVisuals(elements) {
            elements.forEach((el, idx) => {
                if (idx === menuSelectionIndex) {
                    el.classList.add('selected');
                    if(el.tagName === 'BUTTON') el.focus();
                } else {
                    el.classList.remove('selected');
                    if(el.tagName === 'BUTTON') el.blur();
                }
            });
        }
        
        function killPlayer() {
            player.dead = true;
            playSound('explode');
            spawnParticles(player.pos.x, player.pos.y, 30, '#0ff');
            setTimeout(() => {
                gameActive = false;
                stopMusic();
                document.getElementById('start-screen').style.display = 'block';
                document.querySelector('#start-screen h1').innerText = "SYSTEM FAILURE";
                document.getElementById('start-btn').innerText = "REBOOT SYSTEM";
                setTimeout(() => {
                    document.getElementById('start-btn').focus();
                    menuSelectionIndex = 0; // Reset for start menu
                }, 100);
            }, 2000);
        }

        function mainLoop() {
            animationId = requestAnimationFrame(mainLoop);
            updateGamepad();
            if (gameActive && !gamePaused) {
                gameLoopLogic();
            }
        }

        function gameLoopLogic() {
            if (!player) return;
            
            const now = Date.now();
            // Update HUD timer (exclude paused time)
            try {
                const tEl = document.getElementById('game-timer');
                if (tEl && gameStartTime) {
                    let elapsed = now - gameStartTime - pausedAccumMs;
                    if (pauseStartTime) elapsed = pauseStartTime - gameStartTime - pausedAccumMs;
                    if (elapsed < 0) elapsed = 0;
                    tEl.innerText = formatTime(elapsed);
                    if (!gameEnded && elapsed >= GAME_DURATION_MS) {
                        endGame(elapsed);
                        return;
                    }
                }
            } catch(e) { console.warn('timer update failed', e); }
            
            // Sector transition countdown
            if (sectorTransitionActive && warpCountdownAt) {
                const remainingMs = Math.max(0, warpCountdownAt - now);
                overlayMessage.style.display = 'block';
                overlayMessage.innerText = `WARPING TO NEW SECTOR IN ${Math.ceil(remainingMs/1000)}s`;
                overlayMessage.style.color = '#0ff';
                if (remainingMs <= 0) {
                    completeSectorWarp();
                }
            }
            // Dreadnought timed spawn: if timer active and no boss present, spawn a dreadnought
            try {
                if (!sectorTransitionActive && dreadManager.timerActive && !bossActive && dreadManager.timerAt && now >= dreadManager.timerAt) {
                    boss = new Boss('dreadnought');
                    bossActive = true;
                    bossArena.x = (player.pos.x + boss.pos.x) / 2;
                    bossArena.y = (player.pos.y + boss.pos.y) / 2;
                    bossArena.radius = 2500;
                    bossArena.active = true;
                    bossArena.growing = false;
                    dreadManager.timerActive = false;
                    dreadManager.firstSpawnDone = true;
                    showOverlayMessage("WARNING: DREADNOUGHT APPROACHING - ARENA LOCKED", '#f00', 4000);
                    playSound('boss_spawn');
                }
            } catch(e) { console.warn('dread spawn check failed', e); }
            
            // Space Station Spawn (timer-driven)
            if (!sectorTransitionActive && !spaceStation && pendingStations > 0 && nextSpaceStationTime && now >= nextSpaceStationTime) {
                spaceStation = new SpaceStation();
                pendingStations--;
                showOverlayMessage("WARNING: SPACE STATION DETECTED", '#f00', 4000);
                playSound('station_spawn');
                nextSpaceStationTime = null;
            }
            
            if (Date.now() > nextShootingStarTime) {
                shootingStars.push(new ShootingStar());
                scheduleNextShootingStar();
                showOverlayMessage("WARNING: COSMIC EVENT DETECTED", '#fa0', 3000);
            }

            if (!sectorTransitionActive) {
                const currentRoamers = enemies.filter(e => e.type === 'roamer' || e.type === 'elite_roamer' || e.type === 'hunter').length;
                const targetRoamers = 5 + difficultyTier;

                if (currentRoamers + roamerRespawnQueue.length < targetRoamers) {
                    roamerRespawnQueue.push(100); 
                }

                for(let i = roamerRespawnQueue.length - 1; i >= 0; i--) {
                    roamerRespawnQueue[i]--;
                    if (roamerRespawnQueue[i] <= 0) {
                        roamerRespawnQueue.splice(i, 1);
                        let type = 'roamer';
                        // At higher tiers, 20% of roamers upgrade to elites, and 20% of those elites upgrade to hunters
                        if (difficultyTier >= 3 && Math.random() < 0.2) {
                            type = 'elite_roamer';
                            if (difficultyTier >= 5 && Math.random() < 0.2) {
                                type = 'hunter';
                            }
                        }
                        enemies.push(new Enemy(type));
                    }
                }
            } else {
                roamerRespawnQueue = [];
            }
            
            while (environmentAsteroids.length < 100) spawnOneAsteroidRelative();
            
            // Build Spatial Grid for this frame
            asteroidGrid.clear();
            for (let i = 0; i < environmentAsteroids.length; i++) asteroidGrid.insert(environmentAsteroids[i]);

            if (!sectorTransitionActive) {
                if (bases.length < 3) {
                    if (baseRespawnTimers.length === 0) spawnNewBaseRelative();
                }
                
                for(let i = baseRespawnTimers.length - 1; i >= 0; i--) {
                    if (now > baseRespawnTimers[i]) {
                        spawnNewBaseRelative();
                        baseRespawnTimers.splice(i, 1);
                    }
                }
            }
            
            if (bossArena.active) {
                const shrinkSpeed = 0.25; 
                const minRadius = 250;
                const maxRadius = 2500;

                if (bossArena.growing) {
                    bossArena.radius += shrinkSpeed;
                    if (bossArena.radius >= maxRadius) {
                        bossArena.radius = maxRadius;
                        bossArena.growing = false; 
                        showOverlayMessage("WARNING: ARENA STABILIZED - RE-ENGAGING COMPRESSION", '#f00', 3000);
                    }
                } else {
                    bossArena.radius -= shrinkSpeed;
                    if (bossArena.radius <= minRadius) {
                        bossArena.radius = minRadius;
                        bossArena.growing = true; 
                        showOverlayMessage("FIELD INSTABILITY DETECTED - ARENA EXPANDING", '#0f0', 3000);
                    }
                }
            }

            let camX = player.pos.x - width / (2 * ZOOM_LEVEL);
            let camY = player.pos.y - height / (2 * ZOOM_LEVEL);
            if (shakeTimer > 0) {
                shakeTimer--;
                const rx = (Math.random() - 0.5) * shakeMagnitude * 2;
                const ry = (Math.random() - 0.5) * shakeMagnitude * 2;
                camX += rx;
                camY += ry;
            }
            
            if (isNaN(camX)) camX = 0;
            if (isNaN(camY)) camY = 0;

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            // Draw Nebulas
            for (let n of nebulas) {
                let bx = (n.x - camX * n.parallax) % width;
                let by = (n.y - camY * n.parallax) % height;
                if (bx < 0) bx += width;
                if (by < 0) by += height;

                const drawNebula = (x, y) => {
                    if (x + n.radius < 0 || x - n.radius > width || y + n.radius < 0 || y - n.radius > height) return;
                    const g = ctx.createRadialGradient(x, y, 0, x, y, n.radius);
                    g.addColorStop(0, n.colorStart);
                    g.addColorStop(1, n.colorEnd);
                    ctx.fillStyle = g;
                    ctx.beginPath();
                    ctx.arc(x, y, n.radius, 0, Math.PI*2);
                    ctx.fill();
                };

                drawNebula(bx, by);
                // Wrap X
                if (bx < n.radius) drawNebula(bx + width, by);
                else if (bx > width - n.radius) drawNebula(bx - width, by);
                // Wrap Y
                if (by < n.radius) drawNebula(bx, by + height);
                else if (by > height - n.radius) drawNebula(bx, by - height);
                // Corners
                if (bx < n.radius && by < n.radius) drawNebula(bx + width, by + height);
                if (bx > width - n.radius && by < n.radius) drawNebula(bx - width, by + height);
                if (bx < n.radius && by > height - n.radius) drawNebula(bx + width, by - height);
                if (bx > width - n.radius && by > height - n.radius) drawNebula(bx - width, by - height);
            }

            for (let s of starfield) {
                let x = (s.x - camX * s.parallax) % width;
                let y = (s.y - camY * s.parallax) % height;
                if (x < 0) x += width;
                if (y < 0) y += height;
                
                ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                ctx.fillRect(x, y, s.size, s.size);
            }

            ctx.save();
            ctx.scale(ZOOM_LEVEL, ZOOM_LEVEL);
            ctx.translate(-camX, -camY);

            coins.forEach(c => { c.update(); c.draw(ctx); });
            nuggets.forEach(n => { n.update(); n.draw(ctx); });
            powerups.forEach(p => { p.update(); p.draw(ctx); });
            shootingStars.forEach(s => { s.update(); s.draw(ctx); });
            environmentAsteroids.forEach(a => { a.update(); a.draw(ctx); });
            
            if (bossArena.active) {
                ctx.save();
                ctx.translate(bossArena.x, bossArena.y);
                const pulse = 0.5 + Math.sin(now * 0.005) * 0.2;
                if (bossArena.growing) ctx.strokeStyle = `rgba(0, 255, 255, ${pulse})`; 
                else ctx.strokeStyle = `rgba(255, 0, 0, ${pulse})`; 
                
                ctx.lineWidth = 10;
                ctx.shadowBlur = 20;
                // ctx.shadowColor = bossArena.growing ? '#0ff' : '#f00';
                ctx.beginPath();
                ctx.arc(0, 0, bossArena.radius, 0, Math.PI*2);
                ctx.stroke();
                ctx.globalAlpha = 0.1;
                // ctx.fillStyle = bossArena.growing ? '#055' : '#500';
                // ctx.fill();
                ctx.restore();
            }

            player.update();
            player.drawLaser(ctx);
            player.draw(ctx);

            bases.forEach(b => { b.update(); b.draw(ctx); });
            enemies.forEach(e => { e.update(); e.draw(ctx); });
            
            if (bossActive && boss) {
                boss.update();
                boss.draw(ctx);
            }
            
            if (spaceStation) {
                spaceStation.update();
                spaceStation.draw(ctx);
                
                // Update Station Health Bar
                const sContainer = document.getElementById('station-health-container');
                const sFill = document.getElementById('station-health-fill');
                if (sContainer && sFill) {
                    sContainer.style.display = 'flex';
                    const pct = Math.max(0, (spaceStation.hp / spaceStation.maxHp) * 100);
                    sFill.style.width = `${pct}%`;
                }
            } else {
                const sContainer = document.getElementById('station-health-container');
                if (sContainer) sContainer.style.display = 'none';
            }

            bullets.forEach(b => { b.update(); b.draw(ctx); });
            particles.forEach(p => { p.update(); p.draw(ctx); });

            warpParticles.forEach(p => { p.update(); p.draw(ctx); });
            warpParticles = warpParticles.filter(p => !p.dead);

            shockwaves.forEach(s => { s.update(); s.draw(ctx); });
            shockwaves = shockwaves.filter(s => !s.dead);

            compactArray(bullets);
            compactArray(enemies);
            compactArray(bases);
            compactArray(environmentAsteroids);
            compactArray(particles);
            compactArray(coins);
            compactArray(nuggets);
            compactArray(powerups);
            compactArray(shootingStars);

            resolveEntityCollision();
            
            // Bullet Logic Loop
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                let hit = false;
                const astCol = checkBulletWallCollision(b);
                if (astCol.hit) {
                    hit = true;
                    b.dead = true;
                    astCol.obj.break();
                    spawnParticles(b.pos.x, b.pos.y, 8, '#aa8');
                    playSound('hit');
                }
                
                if (!hit) {
                    if (b.isEnemy) {
                        if (!player.dead && !player.invulnerable) {
                             const dist = Math.hypot(b.pos.x - player.pos.x, b.pos.y - player.pos.y);
                             if (dist < player.shieldRadius + b.radius && dist > player.shieldRadius - 10) {
                                  let angle = Math.atan2(b.pos.y - player.pos.y, b.pos.x - player.pos.x) - player.shieldRotation;
                                  while(angle < 0) angle += Math.PI*2;
                                  const count = player.shieldSegments.length;
                                  const segIndex = Math.floor((angle / (Math.PI*2)) * count) % count;
                                  if (player.shieldSegments[segIndex] > 0) {
                                      player.shieldSegments[segIndex]--;
                                      hit = true;
                                      playSound('shield_hit');
                                      spawnParticles(b.pos.x, b.pos.y, 5, '#0ff');
                                  }
                             }
                             if (!hit && dist < player.radius + b.radius) {
                                player.hp -= b.damage;
                                hit = true;
                                updateHealthUI();
                                playSound('hit');
                                shakeMagnitude = 10;
                                shakeTimer = 10;
                                spawnParticles(player.pos.x, player.pos.y, 5, '#f00');
                                if (player.hp <= 0) killPlayer();
                            }
                        }
                    } 
                    else {
                        for (let e of enemies) {
                            if (!e.dead) {
                                const dist = Math.hypot(b.pos.x - e.pos.x, b.pos.y - e.pos.y);
                                if (!b.ignoreShields && e.shieldSegments && e.shieldSegments.length > 0 && dist < e.shieldRadius + b.radius && dist > e.shieldRadius - 10) {
                                      const activeIdx = e.shieldSegments.findIndex(s => s > 0);
                                      if (activeIdx !== -1) {
                                          e.shieldSegments[activeIdx] = 0;
                                          hit = true;
                                          playSound('shield_hit');
                                          spawnParticles(b.pos.x, b.pos.y, 3, '#f0f');
                                      }
                                }

                                if (!hit && dist < e.radius + b.radius) {
                                    e.hp -= b.damage;
                                    hit = true;
                                    playSound('hit');
                                    spawnParticles(e.pos.x, e.pos.y, 3, '#fff');
                                    if (e.hp <= 0) {
                                        e.kill(); // Drops coins
                                        score += 100; // Legacy score bump
                                    }
                                    break;
                                }
                            }
                        }
                        
                        if (!hit && spaceStation) {
                             const dist = Math.hypot(b.pos.x - spaceStation.pos.x, b.pos.y - spaceStation.pos.y);
                             if (!b.ignoreShields && dist < spaceStation.shieldRadius + 10 && dist > spaceStation.shieldRadius - 10) {
                                  let angle = Math.atan2(b.pos.y - spaceStation.pos.y, b.pos.x - spaceStation.pos.x) - spaceStation.shieldRotation;
                                  while(angle < 0) angle += Math.PI*2;
                                  const count = spaceStation.shieldSegments.length;
                                  const idx = Math.floor((angle / (Math.PI*2)) * count) % count;
                                  if (spaceStation.shieldSegments[idx] > 0) {
                                      spaceStation.shieldSegments[idx]--;
                                      hit = true;
                                      playSound('shield_hit');
                                      spawnParticles(b.pos.x, b.pos.y, 5, '#0ff');
                                  }
                             }
                             if (!hit && !b.ignoreShields && dist < spaceStation.innerShieldRadius + 10 && dist > spaceStation.innerShieldRadius - 10) {
                                  let angle = Math.atan2(b.pos.y - spaceStation.pos.y, b.pos.x - spaceStation.pos.x) - spaceStation.innerShieldRotation;
                                  while(angle < 0) angle += Math.PI*2;
                                  const count = spaceStation.innerShieldSegments.length;
                                  const idx = Math.floor((angle / (Math.PI*2)) * count) % count;
                                  if (spaceStation.innerShieldSegments[idx] > 0) {
                                      spaceStation.innerShieldSegments[idx]--;
                                      hit = true;
                                      playSound('shield_hit');
                                      spawnParticles(b.pos.x, b.pos.y, 5, '#f0f');
                                  }
                             }
                             if (!hit && dist < spaceStation.radius + b.radius) {
                                  spaceStation.hp -= b.damage;
                                  hit = true;
                                  playSound('hit');
                                  spawnParticles(b.pos.x, b.pos.y, 5, '#fff');
                                  if (spaceStation.hp <= 0) {
                                      handleSpaceStationDestroyed();
                                  }
                             }
                        }

                        if (!hit && bossActive && boss && !boss.dead) {
                             const dist = Math.hypot(b.pos.x - boss.pos.x, b.pos.y - boss.pos.y);
                             if (!b.ignoreShields && dist < boss.shieldRadius + 5 && dist > boss.shieldRadius - 15) {
                                let angle = Math.atan2(b.pos.y - boss.pos.y, b.pos.x - boss.pos.x) - boss.shieldRotation;
                                while(angle < 0) angle += Math.PI*2;
                                const segCount = boss.shieldSegments.length;
                                const segIndex = Math.floor((angle / (Math.PI*2)) * segCount) % segCount;
                                if (boss.shieldSegments[segIndex] > 0) {
                                    boss.shieldSegments[segIndex]--;
                                    hit = true;
                                    playSound('shield_hit');
                                    spawnParticles(b.pos.x, b.pos.y, 3, '#f00');
                                }
                             }
                             if (!hit && !b.ignoreShields && boss.innerShieldSegments.length > 0 && dist < boss.innerShieldRadius + 5 && dist > boss.innerShieldRadius - 15) {
                                let angle = Math.atan2(b.pos.y - boss.pos.y, b.pos.x - boss.pos.x) - boss.innerShieldRotation;
                                while(angle < 0) angle += Math.PI*2;
                                const count = boss.innerShieldSegments.length;
                                const segIndex = Math.floor((angle / (Math.PI*2)) * count) % count;
                                if (boss.innerShieldSegments[segIndex] > 0) {
                                    boss.innerShieldSegments[segIndex]--;
                                    hit = true;
                                    playSound('shield_hit');
                                    spawnParticles(b.pos.x, b.pos.y, 3, '#f00');
                                }
                             }
                             if (!hit && dist < boss.radius + b.radius) {
                                  boss.hp -= b.damage;
                                  hit = true;
                                  playSound('hit');
                                  spawnParticles(b.pos.x, b.pos.y, 5, '#f00');
                                  if (boss.hp <= 0) {
                                      boss.kill(); // Drops coins
                                      score += 10000;
                                  }
                             }
                        }

                        if (!hit) {
                            for (let base of bases) {
                                if (!base.dead) {
                                    const dist = Math.hypot(b.pos.x - base.pos.x, b.pos.y - base.pos.y);
                                    if (!b.ignoreShields && dist < base.shieldRadius + 5 && dist > base.shieldRadius - 15) {
                                        let angle = Math.atan2(b.pos.y - base.pos.y, b.pos.x - base.pos.x) - base.shieldRotation;
                                        while(angle < 0) angle += Math.PI*2;
                                        const segCount = base.shieldSegments.length;
                                        const segIndex = Math.floor((angle / (Math.PI*2)) * segCount) % segCount;
                                        if (base.shieldSegments[segIndex] > 0) {
                                            base.shieldSegments[segIndex]--;
                                            hit = true;
                                            playSound('shield_hit');
                                            if (base.shieldSegments[segIndex] === 0) spawnParticles(b.pos.x, b.pos.y, 8, '#0ff');
                                            else spawnParticles(b.pos.x, b.pos.y, 3, '#088');
                                            base.aggro = true; 
                                            break;
                                        }
                                    }
                                    if (!b.ignoreShields && base.innerShieldSegments.length > 0 && dist < base.innerShieldRadius + 5 && dist > base.innerShieldRadius - 15) {
                                        let angle = Math.atan2(b.pos.y - base.pos.y, b.pos.x - base.pos.x) - base.innerShieldRotation;
                                        while(angle < 0) angle += Math.PI*2;
                                        const count = base.innerShieldSegments.length;
                                        const segIndex = Math.floor((angle / (Math.PI*2)) * count) % count;
                                        if (base.innerShieldSegments[segIndex] > 0) {
                                            base.innerShieldSegments[segIndex]--;
                                            hit = true;
                                            playSound('shield_hit');
                                            if (base.innerShieldSegments[segIndex] === 0) spawnParticles(b.pos.x, b.pos.y, 8, '#f0f');
                                            else spawnParticles(b.pos.x, b.pos.y, 3, '#808');
                                            base.aggro = true; 
                                            break;
                                        }
                                    }

                                    if (dist < base.radius + b.radius) {
                                        base.hp -= b.damage;
                                        hit = true;
                                        base.aggro = true; 
                                        playSound('hit');
                                        spawnParticles(b.pos.x, b.pos.y, 5, '#f0f');
                                        if (base.hp <= 0) {
                                            base.dead = true;
                                            playSound('base_explode');
                                            spawnParticles(base.pos.x, base.pos.y, 50, '#f0f');
                                            
                                            // DROP COINS
                                            for(let i=0; i<6; i++) {
                                                coins.push(new Coin(base.pos.x + (Math.random()-0.5)*50, base.pos.y + (Math.random()-0.5)*50, 5));
                                            }
                                            nuggets.push(new SpaceNugget(base.pos.x, base.pos.y, 1));
                                            
                                            basesDestroyed++;
                                            basesDestroyedTotal++;
                                            
                                            // Increase Difficulty every 3 bases
                                            difficultyTier = 1 + Math.floor(basesDestroyedTotal / 6);
                                            
                                            score += 1000;
                                            document.getElementById('bases-display').innerText = `${basesDestroyedTotal}`;
                                            
                                            enemies.forEach(e => { if (e.assignedBase === base) e.type = 'roamer'; });
                                            
                                            const delay = 5000 + Math.random() * 5000;
                                            baseRespawnTimers.push(Date.now() + delay);

                                            // Boss spawns are now handled strictly via the dreadnought timer after a boss is destroyed
                                        }
                                        break;
                                    }
                                }
                            }
                        }
                    }
                }
                if (hit) bullets.splice(i, 1);
            }
            
            ctx.restore();
            drawStationIndicator();
            drawMinimap();
        }

        function drawStationIndicator() {
            if (!spaceStation || !player) return;

            const screenW = canvas.width;
            const screenH = canvas.height;
            
            // Check if on screen (approximate bounds)
            const camX = player.pos.x - screenW / (2 * ZOOM_LEVEL);
            const camY = player.pos.y - screenH / (2 * ZOOM_LEVEL);
            const viewW = screenW / ZOOM_LEVEL;
            const viewH = screenH / ZOOM_LEVEL;
            
            // If center of station is within view (plus a bit of margin), don't draw arrow
            if (spaceStation.pos.x > camX && spaceStation.pos.x < camX + viewW &&
                spaceStation.pos.y > camY && spaceStation.pos.y < camY + viewH) {
                return; 
            }

            const dx = spaceStation.pos.x - player.pos.x;
            const dy = spaceStation.pos.y - player.pos.y;
            const angle = Math.atan2(dy, dx);
            
            const margin = 60; 
            const cx = screenW / 2;
            const cy = screenH / 2;
            
            const vx = Math.cos(angle);
            const vy = Math.sin(angle);
            
            // Intersect ray from center with screen bounding box inset by margin
            const bx = cx - margin;
            const by = cy - margin;
            
            const tx = Math.abs(vx) > 0.001 ? bx / Math.abs(vx) : Infinity;
            const ty = Math.abs(vy) > 0.001 ? by / Math.abs(vy) : Infinity;
            const t = Math.min(tx, ty);
            
            const arrowX = cx + vx * t;
            const arrowY = cy + vy * t;
            
            ctx.save();
            ctx.translate(arrowX, arrowY);
            ctx.rotate(angle);
            
            const pulse = 1.0 + Math.sin(Date.now() * 0.01) * 0.2;
            ctx.scale(pulse, pulse);
            
            ctx.fillStyle = '#0ff';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            
            ctx.beginPath();
            ctx.moveTo(15, 0);
            ctx.lineTo(-15, 12);
            ctx.lineTo(-15, -12);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            
            // Distance Text
            ctx.rotate(-angle);
            ctx.fillStyle = '#0ff';
            ctx.font = 'bold 14px Courier New';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowBlur = 4;
            ctx.shadowColor = '#000';
            const dist = Math.hypot(dx, dy);
            ctx.fillText((dist/1000).toFixed(1) + 'km', 0, 25);
            ctx.shadowBlur = 0;
            
            ctx.restore();
        }

        function drawMinimap() {
            minimapFrame++;
            if (minimapFrame % 2 === 1) return; // throttle updates
            minimapCtx.fillStyle = '#001';
            minimapCtx.fillRect(0, 0, 200, 200);
            const radarRange = 4000;
            const scale = 100 / radarRange; 
            
            minimapCtx.save();
            minimapCtx.translate(100, 100);

            minimapCtx.beginPath();
            minimapCtx.arc(0, 0, 100, 0, Math.PI*2);
            minimapCtx.clip();
            
            if (player && !player.dead) {
                minimapCtx.fillStyle = '#0f0';
                minimapCtx.beginPath();
                minimapCtx.arc(0, 0, 3, 0, Math.PI*2);
                minimapCtx.fill();
            }

            minimapCtx.strokeStyle = '#050';
            environmentAsteroids.forEach(a => {
                if (player) {
                    const dx = (a.pos.x - player.pos.x) * scale;
                    const dy = (a.pos.y - player.pos.y) * scale;
                    if (Math.abs(dx) < 100 && Math.abs(dy) < 100) {
                        minimapCtx.beginPath();
                        minimapCtx.arc(dx, dy, Math.max(1, a.radius*scale), 0, Math.PI*2);
                        minimapCtx.stroke();
                    }
                }
            });
            
            minimapCtx.fillStyle = '#f00';
            enemies.forEach(e => {
                 if (player) {
                    const dx = (e.pos.x - player.pos.x) * scale;
                    const dy = (e.pos.y - player.pos.y) * scale;
                    if (Math.abs(dx) < 100 && Math.abs(dy) < 100) {
                        minimapCtx.fillRect(dx-1, dy-1, 3, 3);
                    }
                 }
            });

            minimapCtx.fillStyle = '#f0f';
            bases.forEach(b => {
                 if (player) {
                    const dx = (b.pos.x - player.pos.x) * scale;
                    const dy = (b.pos.y - player.pos.y) * scale;
                    if (Math.abs(dx) < 100 && Math.abs(dy) < 100) {
                        minimapCtx.beginPath();
                        minimapCtx.arc(dx, dy, 5, 0, Math.PI*2);
                        minimapCtx.fill();
                    }
                 }
            });
            
            if (bossActive && boss && !boss.dead && player) {
                const dx = (boss.pos.x - player.pos.x) * scale;
                const dy = (boss.pos.y - player.pos.y) * scale;
                minimapCtx.fillStyle = '#f00';
                minimapCtx.beginPath();
                minimapCtx.arc(dx, dy, 8, 0, Math.PI*2);
                minimapCtx.fill();
            }
            
            minimapCtx.fillStyle = '#ff0';
            coins.forEach(c => {
                if(player) {
                    const dx = (c.pos.x - player.pos.x) * scale;
                    const dy = (c.pos.y - player.pos.y) * scale;
                    if (Math.abs(dx) < 100 && Math.abs(dy) < 100) {
                        minimapCtx.fillRect(dx, dy, 1, 1);
                    }
                }
            });
            
            minimapCtx.fillStyle = '#0f0';
            powerups.forEach(p => {
                if(player) {
                    const dx = (p.pos.x - player.pos.x) * scale;
                    const dy = (p.pos.y - player.pos.y) * scale;
                    if (Math.abs(dx) < 100 && Math.abs(dy) < 100) {
                        minimapCtx.fillRect(dx-1, dy-1, 3, 3);
                    }
                }
            });
            
            if (spaceStation && player) {
                const dx = spaceStation.pos.x - player.pos.x;
                const dy = spaceStation.pos.y - player.pos.y;
                const dist = Math.hypot(dx, dy);
                const angle = Math.atan2(dy, dx);
                
                if (dist * scale > 95) {
                    const px = Math.cos(angle) * 90;
                    const py = Math.sin(angle) * 90;
                    minimapCtx.fillStyle = '#fff';
                    minimapCtx.beginPath();
                    minimapCtx.moveTo(px + Math.cos(angle)*10, py + Math.sin(angle)*10);
                    minimapCtx.lineTo(px + Math.cos(angle + 2.5)*8, py + Math.sin(angle + 2.5)*8);
                    minimapCtx.lineTo(px + Math.cos(angle - 2.5)*8, py + Math.sin(angle - 2.5)*8);
                    minimapCtx.fill();
                } else {
                    const mx = dx * scale;
                    const my = dy * scale;
                    minimapCtx.fillStyle = '#fff';
                    minimapCtx.beginPath();
                    minimapCtx.arc(mx, my, 6, 0, Math.PI*2);
                    minimapCtx.fill();
                }
            }
            
            minimapCtx.restore();
        }

        function startGame() {
                        player = new Spaceship(); 
            score = 0;
            difficultyTier = 1;
            basesDestroyedTotal = 0;
            
            // Reset player stats/inventory
            player.fireDelay = 24;
            
            player.turretLevel = 1;
            player.canWarp = false;
            player.shieldSegments = new Array(8).fill(2);
            player.hp = player.maxHp;
            player.inventory = {};
            player.xp = 0;
            player.level = 1;
            player.nextLevelXp = 100;
            player.stats = {
                damageMult: 1.0,
                fireRateMult: 1.0,
                shotgunFireRateMult: 1.0,
                rangeMult: 1.0,
                multiShot: 1,
                homing: 0, 
                shieldRegenRate: 0,
                speedMult: 1.0,
                slowField: 0,
                slowFieldDuration: 0
            };
            player.staticWeapons = [];
            player.nukeMaxCooldown = 600;
            player.magnetRadius = 150;
            player.nukeUnlocked = false;
            gameEnded = false;
            
            document.getElementById('score').innerText = score;
            document.getElementById('start-screen').style.display = 'none';
            const endScreen = document.getElementById('end-screen');
            if (endScreen) endScreen.style.display = 'none';
            document.getElementById('pause-menu').style.display = 'none';
            gameActive = true;
            gamePaused = false;
            
            setupGameWorld();
            
            if (musicEnabled) {
                initAudio();
                startMusic();
            }
        }

        function togglePause() {
            if (!gameActive) return;
            const wasPaused = gamePaused;
            gamePaused = !gamePaused;
            document.getElementById('pause-menu').style.display = gamePaused ? 'block' : 'none';
            // Pause timer bookkeeping
            if (gamePaused) {
                pauseStartTime = Date.now();
            } else {
                if (pauseStartTime) {
                    pausedAccumMs += Date.now() - pauseStartTime;
                    pauseStartTime = null;
                }
            }
            if (gamePaused) {
                stopMusic();
                setTimeout(() => {
                    document.getElementById('resume-btn').focus();
                    menuSelectionIndex = 0;
                }, 100);
            }
            else if (musicEnabled) startMusic();
        }

        function quitGame() {
            gameActive = false;
            gamePaused = false;
            stopMusic();
            document.getElementById('pause-menu').style.display = 'none';
            document.getElementById('start-screen').style.display = 'block';
            const endScreen = document.getElementById('end-screen');
            if (endScreen) endScreen.style.display = 'none';
            document.querySelector('#start-screen h1').innerText = "NEON SPACE";
            document.getElementById('start-btn').innerText = "INITIATE LAUNCH";
            setTimeout(() => document.getElementById('start-btn').focus(), 100);
            menuSelectionIndex = 0;
        }

        window.addEventListener('keydown', e => {
            if (e.key === 'w' || e.key === 'W') keys.w = true;
            if (e.key === 'a' || e.key === 'A') keys.a = true;
            if (e.key === 's' || e.key === 'S') keys.s = true;
            if (e.key === 'd' || e.key === 'D') keys.d = true;
            if (e.key === ' ') keys.space = true;
            if (e.key === 'e' || e.key === 'E') keys.e = true;
            if (e.key === 'Shift') keys.shift = true;
            if (e.key === 'Escape') togglePause();
            // Debug: instantly destroy space station (Ctrl+Shift+K)
            if (e.ctrlKey && e.shiftKey && (e.key === 'k' || e.key === 'K')) {
                handleSpaceStationDestroyed();
            }
        });

        window.addEventListener('keyup', e => {
            if (e.key === 'w' || e.key === 'W') keys.w = false;
            if (e.key === 'a' || e.key === 'A') keys.a = false;
            if (e.key === 's' || e.key === 'S') keys.s = false;
            if (e.key === 'd' || e.key === 'D') keys.d = false;
            if (e.key === ' ') keys.space = false;
            if (e.key === 'e' || e.key === 'E') keys.e = false;
            if (e.key === 'Shift') keys.shift = false;
        });

                window.addEventListener('mousemove', e => {
            document.body.classList.remove('no-cursor');
            if (typeof mouseScreen !== 'undefined') {
                mouseScreen.x = e.clientX;
                mouseScreen.y = e.clientY;
            }
            if (player) {
                const camX = player.pos.x - width / (2 * ZOOM_LEVEL);
                const camY = player.pos.y - height / (2 * ZOOM_LEVEL);
                mouseWorld.x = (e.clientX / ZOOM_LEVEL) + camX;
                mouseWorld.y = (e.clientY / ZOOM_LEVEL) + camY;
            }
        });
        
        window.addEventListener('mousedown', (e) => {
             mouseState.down = true;
        });
        
        window.addEventListener('mouseup', () => {
             mouseState.down = false;
        });

        window.addEventListener("gamepadconnected", (e) => {
            console.log("Gamepad connected");
            gamepadIndex = e.gamepad.index;
            initAudio();
        });

        document.getElementById('start-btn').addEventListener('click', () => {
            initAudio();
            startGame();
        });
        document.getElementById('restart-btn').addEventListener('click', () => {
            initAudio();
            startGame();
        });
        document.getElementById('resume-btn').addEventListener('click', togglePause);
        document.getElementById('quit-btn').addEventListener('click', quitGame);
        document.getElementById('music-btn').addEventListener('click', toggleMusic);

        document.getElementById('start-btn').focus();
        mainLoop();

    </script>
<script type="module" src="/index.tsx"></script>
