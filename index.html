<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Space Cave</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            touch-action: none;
            user-select: none;
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #hud {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
            letter-spacing: 2px;
            width: 95%;
            pointer-events: none;
        }

        .hud-left {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        /* Status Bars */
        .status-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bar-container {
            width: 150px;
            height: 15px;
            border: 2px solid #fff;
            background: #222;
            position: relative;
        }
        
        .nugget-display {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nugget-icon {
            width: 14px;
            height: 14px;
            background: linear-gradient(135deg, #ff0, #f90 50%, #0ff);
            border: 1px solid #fff;
            box-shadow: 0 0 8px #ff0;
            transform: rotate(45deg);
        }
        .nugget-display .hp-value {
            color: #ff0;
            text-shadow: 0 0 5px #ff0;
        }

        .hp-value {
            margin-left: 8px;
            color: #0f0;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 0 0 5px #0f0;
            align-self: center;
        }

        .hud-timer {
            margin-left: 16px;
            color: #0ff;
            font-weight: bold;
            font-size: 16px;
            text-shadow: 0 0 6px #0ff;
            align-self: center;
            pointer-events: none;
        }

        #health-fill {
            width: 100%;
            height: 100%;
            background-color: #0f0;
            transition: width 0.2s, background-color 0.2s;
        }
        
        #xp-bar-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: #222;
            z-index: 5;
        }
        
        #xp-fill {
            width: 0%;
            height: 100%;
            background-color: #ff0;
            transition: width 0.2s;
            box-shadow: 0 0 5px #ff0;
        }

        /* Warp Cooldown Bar */
        #warp-status {
            display: none; /* Hidden until unlocked */
            align-items: center;
            gap: 10px;
        }
        #warp-fill {
            width: 100%;
            height: 100%;
            background-color: #0ff;
            transition: width 0.1s linear;
        }

        #minimap-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 200px;
            border: 2px solid #0f0;
            background: rgba(0, 20, 0, 0.9);
            box-shadow: 0 0 10px #0f0;
            border-radius: 50%;
            overflow: hidden;
        }

        #minimap {
            width: 100%;
            height: 100%;
            display: block;
        }

        .menu-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border: 2px solid #0f0;
            box-shadow: 0 0 20px #0f0;
            display: none;
            z-index: 10;

        }
        
        #levelup-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            z-index: 20;
            pointer-events: auto;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        #upgrade-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .upgrade-card {
            width: 220px;
            height: 300px;
            border: 2px solid #0f0;
            background: rgba(0, 20, 0, 0.9);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
        }
        
        .upgrade-card:hover, .upgrade-card.selected {
            transform: scale(1.05);
            box-shadow: 0 0 20px #ff0;
            background: #040;
            border-color: #ff0;
        }
        
        .upgrade-title {
            font-size: 18px;
            font-weight: bold;
            color: #ff0;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .upgrade-desc {
            font-size: 14px;
            color: #fff;
            margin-bottom: auto;
            line-height: 1.4;
        }
        
        .upgrade-tier {
            font-size: 12px;
            color: #0ff;
            margin-top: 10px;
        }

        #start-screen {
            display: block;
        }
        
        #end-screen {
            display: none;
        }

        #overlay-message {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 32px;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
            font-weight: bold;
            letter-spacing: 3px;
            display: none;
            width: 100%;
            z-index: 5;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
        }

        p {
            margin-bottom: 30px;
            font-size: 16px;
            color: #afa;
            line-height: 1.5;
        }

        button {
            background: transparent;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 15px 40px;
            font-family: inherit;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            margin: 10px;
            outline: none;
        }

                .no-cursor {
            cursor: none;
        }

        button:hover, button:focus, button.selected {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 15px #0f0;
        }
        
        .objective-text {
            color: #f0f;
        }

        /* Station Boss Bar */
        #station-health-container {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 4;

        }
        #station-name {
            color: #f00;

            text-shadow: 0 0 10px #f00;
            margin-bottom: 4px;

        }
        #station-bar-border {
            width: 100%;
            height: 15px;
            border: 2px solid #f00;
            background: rgba(50, 0, 0, 0.5);

        }
        #station-health-fill {
            width: 100%;
            height: 100%;
            background-color: #f00;
            transition: width 0.1s linear;
        }
    </style>

    <script>

        const UPGRADE_DATA = {

                { "id": "area_nuke", "name": "Area Nuke", "tier1": "Auto-fire 500u blast (5 dmg)", "tier2": "600u range, 10 dmg", "tier3": "800u range, 15 dmg", "notes": "Auto-activates when ready." },
                { "id": "invincibility", "name": "Phase Shield", "tier1": "3s Active / 20s CD", "tier2": "5s Active / 15s CD", "tier3": "7s Active / 10s CD + Regen", "notes": "Auto-cycling invulnerability." },
                { "id": "slow_field", "name": "Stasis Field", "tier1": "Stops roamers 3s", "tier2": "Stops 5s, +25% Area", "tier3": "Stops 8s, +25% Area", "notes": "Freezes enemies." }
              ]
            }
          ]
        };

        // --- Globals ---
        let mouseState = { down: false }; 
        let overlayTimeout = null;
        let warpParticles = [];
        let starfield = [];
        let nebulas = [];
        let shockwaves = [];
        let menuSelectionIndex = 0;
        let sectorIndex = 1;

        // --- Optimization Classes ---
        class SpatialHash {
            constructor(cellSize) {
                this.cellSize = cellSize;
                this.grid = new Map();
            }
            key(x, y) {
                return Math.floor(x / this.cellSize) + "," + Math.floor(y / this.cellSize);
            }
            clear() {
                this.grid.clear();
            }
            insert(entity) {
                const k = this.key(entity.pos.x, entity.pos.y);
                if (!this.grid.has(k)) this.grid.set(k, []);
                this.grid.get(k).push(entity);
            }
            query(x, y) {
                const cx = Math.floor(x / this.cellSize);
                const cy = Math.floor(y / this.cellSize);
                let results = [];
                for (let i = -1; i <= 1; i++) {
                    for (let j = -1; j <= 1; j++) {
                        const k = (cx + i) + "," + (cy + j);
                        const cell = this.grid.get(k);
                        if (cell) {
                            for (let l = 0; l < cell.length; l++) {
                                results.push(cell[l]);
                            }
                        }
                    }
                }
                return results;
            }
        }
        
        const asteroidGrid = new SpatialHash(300); // Cell size approx max asteroid size + buffer

        // --- Base Classes ---
        class Vector {
            constructor(x, y) { this.x = x; this.y = y; }
            add(v) { this.x += v.x; this.y += v.y; }
            sub(v) { this.x -= v.x; this.y -= v.y; }
            mult(s) { this.x *= s; this.y *= s; }
            mag() { return Math.sqrt(this.x*this.x + this.y*this.y); }
            normalize() { 
                const m = this.mag(); 
                if(m > 0) { this.x /= m; this.y /= m; }
            }
        }

        class Entity {
            constructor(x, y) {
                this.pos = new Vector(x, y);
                this.vel = new Vector(0, 0);
                this.radius = 10;
                this.angle = 0;
                this.dead = false;
            }
            update() {
                this.pos.add(this.vel);
            }
        }
        
        class Particle extends Entity {
            constructor(x, y, vx, vy, color = '#fff', life = 30) {
                super(x, y);
                this.vel.x = vx || (Math.random() - 0.5) * 3;
                this.vel.y = vy || (Math.random() - 0.5) * 3;
                this.life = life + Math.random() * 10;
                this.maxLife = this.life;
                this.color = color;
            }
            update() {
                super.update();
                this.life--;
                if (this.life <= 0) this.dead = true;
            }
            draw(ctx) {
                ctx.globalAlpha = this.life / this.maxLife;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.pos.x, this.pos.y, 2, 2);
                ctx.globalAlpha = 1.0;
            }
        }

        class SmokeParticle extends Entity {
            constructor(x, y, vx, vy) {
                super(x, y);
                this.vel.x = vx || (Math.random() - 0.5) * 1;
                this.vel.y = vy || (Math.random() - 0.5) * 1;
                this.life = 60 + Math.random() * 30;
                this.maxLife = this.life;
                this.size = 2 + Math.random() * 4;
            }
            update() {
                this.pos.add(this.vel);
                this.size += 0.1;
                this.life--;
                if (this.life <= 0) this.dead = true;
            }
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = (this.life / this.maxLife) * 0.5;
                ctx.strokeStyle = '#aaa';
                ctx.lineWidth = 1;
                ctx.translate(this.pos.x, this.pos.y);
                ctx.rotate(this.life * 0.1);
                ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        class WarpParticle extends Entity {
            constructor(x, y, angle, speed) {
                super(x, y);
                this.vel.x = Math.cos(angle) * speed;
                this.vel.y = Math.sin(angle) * speed;
                this.life = 20;
                this.maxLife = 20;
                this.length = 20;
                this.color = '#aff';
            }
            update() {
                this.pos.add(this.vel);
                this.life--;
                this.length += 5;
                if (this.life <= 0) this.dead = true;
            }
            draw(ctx) {
                ctx.save();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;
                ctx.globalAlpha = this.life / this.maxLife;
                ctx.beginPath();
                ctx.moveTo(this.pos.x, this.pos.y);
                const tailX = this.pos.x - (this.vel.x / this.vel.mag()) * this.length;
                const tailY = this.pos.y - (this.vel.y / this.vel.mag()) * this.length;
                ctx.lineTo(tailX, tailY);
                ctx.stroke();
                ctx.restore();
            }
        }
        
        class Coin extends Entity {
            constructor(x, y, value) {
                super(x, y);
                this.value = value;
                this.radius = 8;
                this.vel.x = (Math.random() - 0.5) * 0.5;
                this.vel.y = (Math.random() - 0.5) * 0.5;
                this.magnetized = false;
                this.flash = 0;
            }
            
            update() {
                if (!player || player.dead) return;
                
                const dist = Math.hypot(player.pos.x - this.pos.x, player.pos.y - this.pos.y);
                
                if (dist < player.magnetRadius) {
                    this.magnetized = true;
                }
                
                if (this.magnetized) {
                    const angle = Math.atan2(player.pos.y - this.pos.y, player.pos.x - this.pos.x);
                    const speed = 12 + (1000/Math.max(10, dist)); 
                    this.vel.x = Math.cos(angle) * speed;
                    this.vel.y = Math.sin(angle) * speed;
                } else {
                    this.vel.mult(0.98); 
                }
                
                this.pos.add(this.vel);
                this.flash++;
            }
            
            draw(ctx) {
                ctx.save();
                ctx.translate(this.pos.x, this.pos.y);
                const scale = 1.0 + Math.sin(this.flash * 0.1) * 0.2;
                ctx.scale(scale, scale);
                ctx.rotate(Math.PI/4);
                
                let color = '#ff0';
                if (this.value >= 5) color = '#f0f';
                if (this.value >= 10) color = '#0ff';
                
                ctx.fillStyle = color;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.rect(-4, -4, 8, 8);
                ctx.fill();
                ctx.stroke();
                
                ctx.restore();
            }
        }

        class HealthPowerUp extends Entity {
            constructor(x, y) {
                super(x, y);
                this.radius = 15;
                this.vel.x = (Math.random() - 0.5) * 2;
                this.vel.y = (Math.random() - 0.5) * 2;
                this.magnetized = false;
                this.flash = 0;
            }
            
            update() {
                if (!player || player.dead) return;
                
                const dist = Math.hypot(player.pos.x - this.pos.x, player.pos.y - this.pos.y);
                
                if (dist < player.magnetRadius) {
                    this.magnetized = true;
                }
                
                if (this.magnetized) {
                    const angle = Math.atan2(player.pos.y - this.pos.y, player.pos.x - this.pos.x);
                    const speed = 10 + (1000/Math.max(10, dist)); 
                    this.vel.x = Math.cos(angle) * speed;
                    this.vel.y = Math.sin(angle) * speed;
                } else {
                    this.vel.mult(0.95); 
                }
                
                this.pos.add(this.vel);
                this.flash++;
            }
            
            draw(ctx) {
                ctx.save();
                ctx.translate(this.pos.x, this.pos.y);
                const scale = 1.0 + Math.sin(this.flash * 0.1) * 0.2;
                ctx.scale(scale, scale);
                
                ctx.fillStyle = '#0f0';
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#0f0';
                
                ctx.beginPath();
                ctx.rect(-4, -10, 8, 20);
                ctx.rect(-10, -4, 20, 8);
                ctx.fill();
                ctx.stroke();
                
                ctx.shadowBlur = 0;
                ctx.restore();
            }
        }

        // --- Audio System ---
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let musicEnabled = true;
        let musicNodes = [];

        function initAudio() {
            try {
                if (!audioCtx) audioCtx = new AudioCtx();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            } catch(e) {
                console.error("Audio init failed", e);
            }
        }

        function startMusic() {
            if (!musicEnabled || !audioCtx || musicNodes.length > 0) return;
            const t = audioCtx.currentTime;

            // Dark Sci-Fi Drone
            const osc1 = audioCtx.createOscillator();
            osc1.type = 'sawtooth';
            osc1.frequency.setValueAtTime(55, t); 

            const filter1 = audioCtx.createBiquadFilter();
            filter1.type = 'lowpass';
            filter1.frequency.setValueAtTime(300, t);
            
            const lfo1 = audioCtx.createOscillator();
            lfo1.type = 'sine';
            lfo1.frequency.value = 0.2; 
            const lfoGain1 = audioCtx.createGain();
            lfoGain1.gain.value = 200; 
            
            lfo1.connect(lfoGain1);
            lfoGain1.connect(filter1.frequency);

            const gain1 = audioCtx.createGain();
            gain1.gain.setValueAtTime(0.1, t);

            osc1.connect(filter1);
            filter1.connect(gain1);
            gain1.connect(audioCtx.destination);

            const osc2 = audioCtx.createOscillator();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(112, t); 
            
            const gain2 = audioCtx.createGain();
            gain2.gain.setValueAtTime(0.05, t);
            
            const lfo2 = audioCtx.createOscillator();
            lfo2.type = 'sine';
            lfo2.frequency.value = 0.15;
            const lfoGain2 = audioCtx.createGain();
            lfoGain2.gain.value = 0.02;
            
            lfo2.connect(lfoGain2);
            lfoGain2.connect(gain2.gain);

            osc1.start(); 
            lfo1.start();
            osc2.start(); 
            lfo2.start();
            
            musicNodes = [osc1, filter1, lfo1, lfoGain1, gain1, osc2, gain2, lfo2, lfoGain2];
        }

        function playSound(type) {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            try {
                const now = audioCtx.currentTime;
                
                const createOsc = (type, freq, dur, vol) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, now);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    gain.gain.setValueAtTime(vol, now);
                    return { osc, gain };
                };

                if (type === 'shoot') {
                    // Laser sound
                    const { osc, gain } = createOsc('sawtooth', 880, 0.15, 0.1);
                    osc.frequency.exponentialRampToValueAtTime(110, now + 0.15);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                } else if (type === 'coin') {
                    const { osc, gain } = createOsc('sine', 1200, 0.1, 0.1);
                    osc.frequency.exponentialRampToValueAtTime(2000, now + 0.1);
                    gain.gain.linearRampToValueAtTime(0, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                } else if (type === 'hit') {
                    const { osc, gain } = createOsc('square', 200, 0.1, 0.15);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
                    gain.gain.linearRampToValueAtTime(0, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);

                    const { osc, gain } = createOsc('triangle', 600, 0.1, 0.15);
                    osc.frequency.linearRampToValueAtTime(300, now + 0.1);
                    gain.gain.linearRampToValueAtTime(0, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                } else if (type === 'explode') {
                    const { osc, gain } = createOsc('sawtooth', 100, 0.3, 0.2);
                    osc.frequency.exponentialRampToValueAtTime(10, now + 0.3);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);

                    osc1.connect(gain);
                    osc2.connect(gain);
                    gain.connect(audioCtx.destination);
                    
                    gain.gain.setValueAtTime(0.5, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                    
                    osc1.start(now);
                    osc2.start(now);

        class EnvironmentAsteroid extends Entity {
            constructor(x, y, r, sizeLevel = 3) {
                super(x, y);
                this.radius = r;
                this.sizeLevel = sizeLevel;
                const speed = (Math.random() * 0.2) + 0.1; 
                const angle = Math.random() * Math.PI * 2;
                this.vel.x = Math.cos(angle) * speed;
                this.vel.y = Math.sin(angle) * speed;
                this.rotSpeed = (Math.random() - 0.5) * 0.01;
                
                this.vertices = [];
                const points = 8 + Math.floor(Math.random() * 6);
                for(let i=0; i<points; i++) {
                    const angle = (i / points) * Math.PI * 2;
                    const rad = r * (0.8 + Math.random() * 0.4);
                    this.vertices.push({x: Math.cos(angle)*rad, y: Math.sin(angle)*rad});
                }
            }
            
            update() {
                this.pos.add(this.vel);
                this.angle += this.rotSpeed;
                checkDespawn(this, 5000);
            }
            
            break() {
                if (this.dead) return;
                this.dead = true;
                // previously dropped a coin here; asteroid drops disabled
                
                if (this.sizeLevel > 1) {
                     const newSize = this.sizeLevel - 1;
                     const newR = this.radius * 0.6;
                     for(let i=0; i<3; i++) {
                         const a = new EnvironmentAsteroid(this.pos.x, this.pos.y, newR, newSize);
                         a.vel.x = this.vel.x + (Math.random()-0.5)*2;
                         a.vel.y = this.vel.y + (Math.random()-0.5)*2;
                         environmentAsteroids.push(a);
                     }
                }
            }
            
            draw(ctx) {
                ctx.save();
                ctx.translate(this.pos.x, this.pos.y);
                ctx.rotate(this.angle);
                
                if (sectorIndex >= 2) {
                    ctx.strokeStyle = '#ccc';
                    ctx.shadowColor = '#bbb';
                } else {
                    if (this.sizeLevel === 3) ctx.strokeStyle = '#005500';
                    else if (this.sizeLevel === 2) ctx.strokeStyle = '#006600';
                    else ctx.strokeStyle = '#008800';
                    ctx.shadowColor = '#003300';
                }

                ctx.lineWidth = 3;
                ctx.shadowBlur = 10;
                
                ctx.beginPath();
                ctx.moveTo(this.vertices[0].x, this.vertices[0].y);
                for(let i=1; i<this.vertices.length; i++) {
                    ctx.lineTo(this.vertices[i].x, this.vertices[i].y);
                }
                ctx.closePath();
                ctx.stroke();
                
                ctx.restore();
            }
        }

        function spawnOneAsteroidRelative(initial = false) {
             if (!player) return;
             let attempts = 0;
             while(attempts < 50) {
                 attempts++;
                 const angle = Math.random() * Math.PI * 2;
                 const minDist = initial ? 500 : 2000;
                 const maxDist = initial ? 3000 : 4000;
                 const dist = minDist + Math.random() * (maxDist - minDist);
                 const x = player.pos.x + Math.cos(angle) * dist;
                 const y = player.pos.y + Math.sin(angle) * dist;
                 const r = 50 + Math.random() * 150; 
                 
                 let safe = true;
                 for(let b of bases) {
                     if (Math.hypot(x - b.pos.x, y - b.pos.y) < b.shieldRadius + r + 200) safe = false;
                 }
                 
                 if (safe) {
                     environmentAsteroids.push(new EnvironmentAsteroid(x, y, r, 3));
                     break;
                 }
             }
        }

        function rayCast(x1, y1, angle, maxDist) {
            const vx = Math.cos(angle);
            const vy = Math.sin(angle);
            let closest = { hit: false, dist: maxDist, x: x1 + vx*maxDist, y: y1 + vy*maxDist };
            
            for(let ast of environmentAsteroids) {
                const cx = ast.pos.x;
                const cy = ast.pos.y;
                const r = ast.radius;
                const fx = x1 - cx;
                const fy = y1 - cy;
                const a = vx*vx + vy*vy; 
                const b = 2 * (fx*vx + fy*vy);
                const c = (fx*fx + fy*fy) - r*r;
                const discriminant = b*b - 4*a*c;
                if (discriminant >= 0) {
                    const t1 = (-b - Math.sqrt(discriminant)) / (2*a);
                    const t2 = (-b + Math.sqrt(discriminant)) / (2*a);
                    let t = -1;
                    if (t1 >= 0 && t1 <= maxDist) t = t1;
                    else if (t2 >= 0 && t2 <= maxDist) t = t2; 
                    if (t >= 0 && t < closest.dist) {
                        closest.hit = true;
                        closest.dist = t;
                        closest.x = x1 + vx*t;
                        closest.y = y1 + vy*t;
                        closest.obj = ast;
                    }
                }
            }
            return closest;
        }

                updateXpUI();
            }

            addXp(amount) {
                this.xp += amount;
                if (this.xp >= this.nextLevelXp) {
                    this.levelUp();
                }
                updateXpUI();
            }
            
            levelUp() {
                this.level++;
                this.xp -= this.nextLevelXp;
                this.nextLevelXp = Math.floor(this.nextLevelXp * 1.2);
                
                // Pause and Show Menu
                playSound('levelup');
                gameActive = false; // Soft pause logic required
                showLevelUpMenu();
            }

            update() {
                if (this.dead) return;
                this.shieldRotation += 0.02;

                const aimMag = Math.sqrt(gpState.aim.x*gpState.aim.x + gpState.aim.y*gpState.aim.y);
                if (aimMag > 0.2) {
                    this.turretAngle = Math.atan2(gpState.aim.y, gpState.aim.x);
                } else {
                    const targetAngle = Math.atan2(mouseWorld.y - this.pos.y, mouseWorld.x - this.pos.x);
                    this.turretAngle = targetAngle;
                }

                const moveMag = Math.sqrt(gpState.move.x*gpState.move.x + gpState.move.y*gpState.move.y);
                let thrusting = false;
                
                // Removed acceleration stat multiplier, using base or 1.0 implicitly
                const currentThrust = this.thrustPower; 
                const currentMaxSpeed = this.maxSpeed * this.stats.speedMult;
                // Removed rotation stat multiplier
                const currentRot = this.rotationSpeed;

                if (moveMag > 0.1) {
                    const targetAngle = Math.atan2(gpState.move.y, gpState.move.x);
                    let angleDiff = targetAngle - this.angle;
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                    if (Math.abs(angleDiff) > 0.05) {
                        this.angle += Math.sign(angleDiff) * Math.min(Math.abs(angleDiff), 0.15); 
                    }
                    this.vel.x += Math.cos(targetAngle) * (currentThrust * moveMag);
                    this.vel.y += Math.sin(targetAngle) * (currentThrust * moveMag);
                    thrusting = true;
                } else {
                    if (keys.a) this.angle -= currentRot;
                    if (keys.d) this.angle += currentRot;
                    if (keys.w) {
                        this.vel.x += Math.cos(this.angle) * currentThrust;
                        this.vel.y += Math.sin(this.angle) * currentThrust;
                        thrusting = true;
                    }
                    if (keys.s) {
                        this.vel.x -= Math.cos(this.angle) * (currentThrust * 0.5);
                        this.vel.y -= Math.sin(this.angle) * (currentThrust * 0.5);
                        thrusting = true;
                    }
                }

                this.fireDelay = this.baseFireDelay / this.stats.fireRateMult;
                this.shotgunDelay = this.baseShotgunDelay / this.stats.shotgunFireRateMult;
                this.autofireTimer--;
                this.shotgunTimer--;
                if (this.autofireTimer <= 0) {
                    this.shoot();
                    this.autofireTimer = Math.max(4, this.fireDelay);
                }
                
                // Shield Regen
                if (this.stats.shieldRegenRate > 0) {
                    const now = Date.now();
                    if (now - this.lastShieldRegenTime > this.stats.shieldRegenRate * 1000) {
                        const emptyIdx = this.shieldSegments.findIndex(s => s < 2);
                        if (emptyIdx !== -1) {
                            this.shieldSegments[emptyIdx] = 2;
                            playSound('powerup'); // Soft sound
                        }
                        this.lastShieldRegenTime = now;
                    }
                }
                
                // Auto-Cycling Invincibility Phase Shield
                if (this.invincibilityCycle.unlocked) {
                    this.invincibilityCycle.timer--;
                    
                    if (this.invincibilityCycle.state === 'ready') {
                        // Start active phase immediately if ready
                        this.invincibilityCycle.state = 'active';
                        this.invincibilityCycle.timer = this.invincibilityCycle.stats.duration;
                        playSound('powerup');
                        // showOverlayMessage("PHASE SHIELD ACTIVE", '#ff0', 1000);
                    } else if (this.invincibilityCycle.state === 'active') {
                        this.invulnerable = 2; // Sustain invulnerability each frame
                        
                        // Tier 3 Regen
                        if (this.invincibilityCycle.stats.regen && this.invincibilityCycle.timer % 60 === 0) {
                             const emptyIdx = this.shieldSegments.findIndex(s => s < 2);
                             if (emptyIdx !== -1) this.shieldSegments[emptyIdx] = 2;
                        }

                        if (this.invincibilityCycle.timer <= 0) {
                            this.invincibilityCycle.state = 'cooldown';
                            this.invincibilityCycle.timer = this.invincibilityCycle.stats.cooldown;
                        }
                    } else if (this.invincibilityCycle.state === 'cooldown') {
                        if (this.invincibilityCycle.timer <= 0) {
                            this.invincibilityCycle.state = 'ready';
                        }
                    }
                }
                
                // Homing Missiles (Separate System)
                if (this.stats.homing > 0) {
                    this.missileTimer--;
                    if (this.missileTimer <= 0) {
                        this.fireMissiles();
                        this.missileTimer = 60 / this.stats.fireRateMult;
                    }
                }

                // Auto Nuke Trigger
                if (this.nukeCooldown > 0) this.nukeCooldown--;
                if (this.nukeUnlocked && this.nukeCooldown <= 0) {
                    this.fireNuke();
                }
                
                if (this.canWarp) {
                    if (this.warpCooldown > 0) {
                        this.warpCooldown--;
                        updateWarpUI();
                    } else if (keys.shift || gpState.warp) {
                        this.warp();
                    }
                }

                if (this.hp <= 3 && Math.random() < 0.1) {
                    spawnSmoke(this.pos.x, this.pos.y, 1);
                }

                const speed = this.vel.mag();
                if (speed > currentMaxSpeed) this.vel.mult(currentMaxSpeed / speed);

                if (thrusting) {
                     const bx = this.pos.x - Math.cos(this.angle) * 35;
                     const bx2 = this.pos.y - Math.sin(this.angle) * 35;
                     if(Math.random() > 0.5) spawnParticles(bx, bx2, 1, '#0aa');
                }

                this.vel.mult(this.friction);
                
                super.update();
                checkWallCollision(this, 0.0);

                if (this.invulnerable > 0) {
                    this.invulnerable--;
                    if (this.invincibilityCycle.state === 'active') {
                        this.visible = true;
                    } else {
                        this.visible = Math.floor(Date.now() / 100) % 2 === 0;
                    }
                } else {
                    this.visible = true;
                }
            }
            
            fireNuke() {
                shockwaves.push(new Shockwave(this.pos.x, this.pos.y, this.nukeDamage, this.nukeRange));
                this.nukeCooldown = this.nukeMaxCooldown;
            //    showOverlayMessage("NUKE DEPLOYED", '#ff0', 1000);
            }

            warp() {
                spawnParticles(this.pos.x, this.pos.y, 30, '#0ff');
                playSound('warp');
                const angle = Math.random() * Math.PI * 2;
                const dist = 3000 + Math.random() * 2000;
                this.pos.x += Math.cos(angle) * dist;
                this.pos.y += Math.sin(angle) * dist;
                this.vel.x = 0;
                this.vel.y = 0;
                spawnParticles(this.pos.x, this.pos.y, 30, '#0ff');
                this.warpCooldown = this.maxWarpCooldown;
                updateWarpUI();
            }

            fireMissiles() {
                const count = this.stats.homing * 2;
                for(let i=0; i<count; i++) {
                    const angleOffset = (i - (count-1)/2) * 0.3; 
                    const angle = this.turretAngle + angleOffset + (Math.random()-0.5)*0.2;
                    // Homing strength 2 (strong), damage 1
                    const b = new Bullet(this.pos.x, this.pos.y, angle, false, 1, 12, 3, '#f80', 2);
                    b.ignoreShields = false; // missiles now respect shields
                    b.isMissile = true;
                    bullets.push(b);
                    spawnSmoke(this.pos.x, this.pos.y, 1);
                }
            }

            shoot() {
                const damage = 2 * this.stats.damageMult;
                const bulletSpeed = 15;
                const shots = this.stats.multiShot; 
                
                // Calculate firing vectors for parallel multi-shot
                const aimX = Math.cos(this.turretAngle);
                const aimY = Math.sin(this.turretAngle);
                const perpX = -aimY; // Right vector
                const perpY = aimX;
                const spacing = 12; // Gap between projectiles

                for(let i=0; i<shots; i++) {
                    // Parallel offset logic
                    const offset = (i - (shots - 1) / 2) * spacing;
                    
                    const bx = this.pos.x + aimX * 25 + perpX * offset;
                    const by = this.pos.y + aimY * 25 + perpY * offset;
                    
                    bullets.push(new Bullet(bx, by, this.turretAngle, false, damage, bulletSpeed, 4, null, 0));
                    spawnBarrelSmoke(bx, by, this.turretAngle);
                }
                
                // Shotgun Logic
                const shotgunTier = this.inventory['shotgun'] || 0;
                if (shotgunTier > 0 && this.shotgunTimer <= 0) {
                    const count = shotgunTier === 1 ? 5 : (shotgunTier === 2 ? 8 : 12);
                    const dmg = this.stats.damageMult * 0.5;
                    const spread = 0.5; 
                    
                    for(let i=0; i<count; i++) {
                        const a = this.turretAngle + (Math.random() - 0.5) * spread;
                        const s = 12 + (Math.random() - 0.5) * 4;
                        const b = new Bullet(this.pos.x, this.pos.y, a, false, dmg, s, 3, '#f00', 0, 'square');
                        b.life = (20 + (shotgunTier * 5)) * this.stats.rangeMult;
                        bullets.push(b);
                    }
                    playSound('shotgun');
                    spawnBarrelSmoke(this.pos.x, this.pos.y, this.turretAngle);
                    this.shotgunTimer = Math.max(4, this.shotgunDelay);
                }

                // Static Weapons
                this.staticWeapons.forEach(w => {
                    let angleBase = this.angle;
                    if (w.type === 'side') {
                        bullets.push(new Bullet(this.pos.x, this.pos.y, this.angle + Math.PI/2, false, damage, bulletSpeed, 4, '#0f0'));
                        bullets.push(new Bullet(this.pos.x, this.pos.y, this.angle - Math.PI/2, false, damage, bulletSpeed, 4, '#0f0'));
                    } else if (w.type === 'rear') {
                        bullets.push(new Bullet(this.pos.x, this.pos.y, this.angle + Math.PI, false, damage*2, bulletSpeed*0.8, 6, '#f00', 2)); // Rear missiles homing
                    } else { // Forward
                        bullets.push(new Bullet(this.pos.x, this.pos.y, this.angle, false, damage, bulletSpeed, 4, '#0f0'));
                    }
                });
            }
            
            drawLaser(ctx) {
                if (!this.visible || this.dead) return;
                const startX = this.pos.x + Math.cos(this.turretAngle) * 25;
                const startY = this.pos.y + Math.sin(this.turretAngle) * 25;
                const hit = rayCast(startX, startY, this.turretAngle, 2000 * this.stats.rangeMult);
                
                ctx.save();
                ctx.strokeStyle = '#8ff'; 
                ctx.lineWidth = 2; 
                ctx.setLineDash([5, 10]);
                ctx.globalAlpha = 0.5; 
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(hit.x, hit.y);
                ctx.stroke();
                
                ctx.setLineDash([]);
                ctx.globalAlpha = 0.8;
                ctx.fillStyle = '#aff';
                ctx.beginPath();
                ctx.arc(hit.x, hit.y, 4, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }

            draw(ctx) {
                if (!this.visible || this.dead) return;
                ctx.save();
                ctx.translate(this.pos.x, this.pos.y);
                
                // Draw Phase Shield Visual
                if (this.invincibilityCycle.unlocked && this.invincibilityCycle.state === 'active') {
                    ctx.save();
                    // Keep the phase shield a constant, transparent yellow — no pulsing or glow
                    ctx.shadowBlur = 0;
                    ctx.shadowColor = 'rgba(0,0,0,0)';
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = 'rgba(255,220,0,0.6)';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.shieldRadius + 8, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }
                
                ctx.save();
                ctx.rotate(this.shieldRotation);
                ctx.lineWidth = 3;
                const segCount = this.shieldSegments.length;
                const segAngle = (Math.PI * 2) / segCount;
                for(let i=0; i<segCount; i++) {
                    if (this.shieldSegments[i] > 0) {
                         ctx.strokeStyle = '#0ff';
                         ctx.shadowBlur = 5;
                         ctx.shadowColor = '#0ff';
                         ctx.globalAlpha = this.shieldSegments[i] / 2;
                         ctx.beginPath();
                         ctx.arc(0, 0, this.shieldRadius, i * segAngle + 0.1, (i+1) * segAngle - 0.1);
                         ctx.stroke();
                         ctx.shadowBlur = 0;
                    }
                }
                ctx.restore();
                
                // Slow Field Visual
                if (this.stats.slowField > 0) {
                    ctx.fillStyle = 'rgba(0, 200, 255, 0.1)';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.stats.slowField, 0, Math.PI*2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0, 200, 255, 0.3)';
                    ctx.stroke();
                }

                ctx.save();
                ctx.rotate(this.angle);
                
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#0ff';
                
                const s = 1.4; 
                ctx.beginPath();
                ctx.moveTo(25*s, 0); 
                ctx.lineTo(-10*s, 10*s);
                ctx.lineTo(-20*s, 20*s); 
                ctx.lineTo(-20*s, 5*s); 
                ctx.lineTo(-25*s, 5*s); 
                ctx.lineTo(-25*s, -5*s);
                ctx.lineTo(-20*s, -5*s);
                ctx.lineTo(-20*s, -20*s);
                ctx.lineTo(-10*s, -10*s);
                ctx.closePath();
                ctx.fillStyle = '#122'; 
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 2;
                ctx.fill();
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(10*s, 0);
                ctx.lineTo(-15*s, 8*s);
                ctx.moveTo(10*s, 0);
                ctx.lineTo(-15*s, -8*s);
                ctx.stroke();
                
                ctx.fillStyle = '#011';
                ctx.beginPath();
                ctx.ellipse(-5*s, 0, 8*s, 4*s, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.stroke();

                if (keys.w || (Math.abs(gpState.move.x) > 0.1 || Math.abs(gpState.move.y) > 0.1)) {
                    ctx.fillStyle = '#0ff';
                    ctx.beginPath();
                    ctx.moveTo(-25*s, 4*s);
                    ctx.lineTo(-40*s, 0);
                    ctx.lineTo(-25*s, -4*s);
                    ctx.fill();
                }
                
                // Static Weapons Visuals
                if (this.staticWeapons.length > 0) {
                     ctx.fillStyle = '#0f0';
                     this.staticWeapons.forEach(w => {
                         ctx.save();
                         if (w.type === 'forward') ctx.rotate(0);
                         if (w.type === 'side') {
                             ctx.fillRect(10*s, -10*s, 4, 8);
                             ctx.fillRect(10*s, 10*s, 4, 8);
                         }
                         if (w.type === 'rear') ctx.rotate(Math.PI);
                         
                         if (w.type !== 'side') ctx.fillRect(10*s, -2, 8, 4);
                         ctx.restore();
                     });
                }

                ctx.shadowBlur = 0;
                if (this.hp < 10) {
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    const count = Math.ceil((10 - this.hp) / 2);
                    for(let i=0; i<count; i++) {
                         const x1 = (Math.random()-0.5)*15;
                         const y1 = (Math.random()-0.5)*15;
                         const x2 = x1 + (Math.random()-0.5)*10;
                         const y2 = y1 + (Math.random()-0.5)*10;
                         ctx.moveTo(x1, y1);
                         ctx.lineTo(x2, y2);
                    }
                    ctx.stroke();
                }
                ctx.restore(); 

                ctx.save();
                ctx.rotate(this.turretAngle);
                ctx.fillStyle = '#000';
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                
                const sT = 1.2;
                if (this.stats.multiShot >= 2) {
                     // Draw parallel barrels
                     const spacing = 12 * sT; // Spacing for visual barrels
                     const shots = this.stats.multiShot;
                     for(let i=0; i<shots; i++) {
                         const offset = (i - (shots - 1) / 2) * spacing;
                         ctx.beginPath(); 
                         ctx.rect(0, -3*sT + offset, 25*sT, 6*sT); 
                         ctx.fill(); 
                         ctx.stroke();
                     }
                } else {
                    ctx.beginPath(); ctx.rect(0, -3*sT, 25*sT, 6*sT); ctx.fill(); ctx.stroke();
                }
                
                ctx.beginPath();
                ctx.arc(0, 0, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#033';
                ctx.fill();
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, -4); ctx.lineTo(6, 0); ctx.lineTo(0, 4);
                ctx.fillStyle = '#0ff';
                ctx.fill();

                ctx.restore(); 
                ctx.restore(); 
            }
        }

        class Shockwave extends Entity {
            constructor(x, y, damage, maxRadius = 500) {
                super(x, y);
                this.damage = damage;
                this.currentRadius = 10;
                this.maxRadius = maxRadius;
                this.speed = 25;
                this.hitList = [];
            }
            update() {
                this.currentRadius += this.speed;
                if (this.currentRadius >= this.maxRadius) this.dead = true;
                
                const targets = [...enemies];
                if (boss && bossActive && !boss.dead) targets.push(boss);

                for(let e of targets) {
                    if (e.dead || this.hitList.includes(e)) continue;
                    const dist = Math.hypot(e.pos.x - this.pos.x, e.pos.y - this.pos.y);
                    if (dist < this.currentRadius + e.radius) {
                        e.hp -= this.damage;
                        this.hitList.push(e);
                        playSound('hit');
                        spawnParticles(e.pos.x, e.pos.y, 5, '#ff0');
                        if (e.hp <= 0) e.kill();
                    }
                }
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.pos.x, this.pos.y);
                ctx.beginPath();
                ctx.arc(0, 0, this.currentRadius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 255, 0, ${1 - (this.currentRadius / this.maxRadius)})`;
                ctx.lineWidth = 8;
                ctx.stroke();
                ctx.restore();
            }
        }

        class ShootingStar extends Entity {
            constructor() {
                super(0, 0);
                const angle = Math.random() * Math.PI * 2;
                const dist = 2500; // Start far out
                this.pos.x = player.pos.x + Math.cos(angle) * dist;
                this.pos.y = player.pos.y + Math.sin(angle) * dist;
                
                // Aim somewhat near the player
                const targetX = player.pos.x + (Math.random() - 0.5) * 1000;
                const targetY = player.pos.y + (Math.random() - 0.5) * 1000;
                const travelAngle = Math.atan2(targetY - this.pos.y, targetX - this.pos.x);
                
                this.vel.x = Math.cos(travelAngle) * 30; // Fast
                this.vel.y = Math.sin(travelAngle) * 30;
                
                this.radius = 40;
                this.damage = 10;
                this.life = 300; // 5 seconds at 60fps
            }
            
            update() {
                this.pos.add(this.vel);
                this.life--;
                if (this.life <= 0) this.dead = true;
                
                // Trail
                for(let i=0; i<5; i++) {
                    particles.push(new Particle(
                        this.pos.x + (Math.random()-0.5)*20, 
                        this.pos.y + (Math.random()-0.5)*20, 
                        -this.vel.x * 0.2 + (Math.random()-0.5)*2, 
                        -this.vel.y * 0.2 + (Math.random()-0.5)*2, 
                        '#ffaa00'
                    ));
                }
            }
            
            draw(ctx) {
                ctx.save();
                ctx.translate(this.pos.x, this.pos.y);
                
                // Glowing head
                const grad = ctx.createRadialGradient(0, 0, 10, 0, 0, 40);
                grad.addColorStop(0, '#fff');
                grad.addColorStop(0.4, '#ffaa00');
                grad.addColorStop(1, 'rgba(255, 100, 0, 0)');
                
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(0, 0, 40, 0, Math.PI*2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        class Bullet extends Entity {
            constructor(x, y, angle, isEnemy, damage = 1, speed = 10, radius = 4, color = null, homing = 0, shape = null) {
                super(x, y);
                this.speed = speed;
                this.angle = angle;
                this.vel.x = Math.cos(angle) * this.speed;
                this.vel.y = Math.sin(angle) * this.speed;
                this.isEnemy = isEnemy;
                this.damage = damage;
                this.radius = radius;
                this.life = 100 * player.stats.rangeMult; 
                this.color = color;
                this.homing = homing; 
                this.ignoreShields = false;
                this.isMissile = false;
                this.shape = shape;
            }
            update() {
                // Homing Logic
                if (this.homing > 0 && !this.isEnemy) {
                    let target = null;
                    let minDist = 500;
                    for (let e of enemies) {
                        const d = Math.hypot(e.pos.x - this.pos.x, e.pos.y - this.pos.y);
                        if (d < minDist && !e.dead) {
                            minDist = d;
                            target = e;
                        }
                    }
                    if (boss && !boss.dead && bossActive) {
                         const d = Math.hypot(boss.pos.x - this.pos.x, boss.pos.y - this.pos.y);
                         if (d < minDist) target = boss;
                    }
                    
                    if (target) {
                        const targetAngle = Math.atan2(target.pos.y - this.pos.y, target.pos.x - this.pos.x);
                        let angleDiff = targetAngle - this.angle;
                        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                        
                        const turnRate = this.homing === 2 ? 0.2 : 0.05;
                        this.angle += Math.sign(angleDiff) * Math.min(Math.abs(angleDiff), turnRate);
                        
                        this.vel.x = Math.cos(this.angle) * this.speed;
                        this.vel.y = Math.sin(this.angle) * this.speed;
                    }
                }

                super.update();
                this.life--;
                if (this.life <= 0) this.dead = true;
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.pos.x, this.pos.y);
                
                if (this.isMissile) {
                    ctx.rotate(this.angle);
                    ctx.fillStyle = '#f80';
                    ctx.beginPath();
                    ctx.moveTo(6, 0);
                    ctx.lineTo(-4, 4);
                    ctx.lineTo(-4, -4);
                    ctx.fill();
                    // Engine glow
                    ctx.fillStyle = `rgba(255, 100, 0, ${0.5 + Math.random()*0.5})`;
                    ctx.fillRect(-6, -2, 4, 4);
                    ctx.restore();
                    return;
                }

                if (this.color) {
                    ctx.fillStyle = this.color;
                } else {
                    ctx.fillStyle = this.isEnemy ? '#f44' : '#ff0';
                }

                if (this.shape === 'square') {
                    const size = this.radius * 2;
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = ctx.fillStyle;
                    ctx.fillRect(-size/2, -size/2, size, size);
                    ctx.shadowBlur = 0;
                } else if (!this.isEnemy) {
                    // Laser look
                    ctx.rotate(this.angle);
                    const w = this.radius * 2;
                    const l = w * 5;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = ctx.fillStyle;
                    ctx.beginPath();
                    ctx.rect(-l/2, -this.radius, l, w);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                } else {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius, 0, Math.PI*2);
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = ctx.fillStyle;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
                ctx.restore();
            }
        }

        class Enemy extends Entity {
            constructor(type = 'roamer', startPos = null, assignedBase = null) {
                super(0, 0);
                this.type = type;
                this.assignedBase = assignedBase;
                this.shieldSegments = [];
                this.shieldRadius = 0;
                this.shieldRotation = 0;

                if (startPos) {
                    this.pos.x = startPos.x;
                    this.pos.y = startPos.y;
                } else {
                    const start = findSpawnPointRelative(true);
                    this.pos.x = start.x;
                    this.pos.y = start.y;
                }

                this.radius = 20; 
                const speedMult = 1 + (difficultyTier - 1) * 0.1;
                this.thrustPower = 0.12 * speedMult; 
                this.maxSpeed = 4.0 * speedMult; 
                this.thrustPower = 0.18 * speedMult; 
                this.maxSpeed = 6.0 * speedMult; 
                this.rotationSpeed = 0.05;
                this.friction = 0.97;
                
                if (this.type === 'roamer') {
                    this.hp = 1;
                } else if (this.type === 'elite_roamer') {
                    this.hp = 6 + (difficultyTier * 2);
                    this.shieldSegments = new Array(6).fill(1);
                    this.shieldRadius = 35;
                    this.radius = 25;
                    this.maxSpeed *= 0.8; 
                } else if (this.type === 'hunter') {
                    this.hp = 12 + (difficultyTier * 3);
                    this.radius = 22;
                    this.maxSpeed = 5.5 + (difficultyTier * 0.2);
                    this.thrustPower = 0.25;
                    this.shootTimer = 45;
                } else {
                    this.hp = 5 + (difficultyTier - 1) * 2; 
                }
                
                this.shootTimer = 120;
                if (this.type === 'elite_roamer' || this.type === 'hunter') this.shootTimer = 90;
                
                this.turnSpeed = (Math.PI * 2) / (8 * 60); 
                this.smoothDir = new Vector(Math.random(), Math.random());
                
                this.aiState = 'SEEK'; 
                this.aiTimer = 0;
                this.freezeTimer = 0;
                this.freezeCooldown = 0;
                this.flankSide = 1;
            }
            
            getAimAngle() {
                if (!player || player.dead) return 0;
                const dx = player.pos.x - this.pos.x;
                const dy = player.pos.y - this.pos.y;
                const dist = Math.hypot(dx, dy);
                const angle = Math.atan2(dy, dx);
                if ((this.type === 'elite_roamer' || this.type === 'hunter') && dist < 600) {
                     const lead = Math.min(30, dist / 10);
                     return Math.atan2(player.pos.y + player.vel.y*lead - this.pos.y, player.pos.x + player.vel.x*lead - this.pos.x);
                }
                return angle; 
            }
            
            kill() {
                this.dead = true;
                playSound('explode');
                spawnParticles(this.pos.x, this.pos.y, 15, '#f00');
                
                // DROP COINS
                let val = 2;
                let count = 3;
                if (this.type === 'elite_roamer') { val=3; count=4; }
                if (this.type === 'hunter') { val=4; count=5; }
                if (this.type === 'defender') { val=3; count=3; }
                for(let i=0; i<count; i++) {
                    coins.push(new Coin(this.pos.x, this.pos.y, val));
                }

                if (this.type === 'roamer' || this.type === 'elite_roamer' || this.type === 'hunter') roamerRespawnQueue.push(Math.floor(Math.random() * 300));
            }

            update() {
                checkDespawn(this, 5000);
                if (this.dead) return;
                
                // Stasis Field Logic (Freeze)
                if (this.freezeTimer > 0) {
                    this.freezeTimer--;
                    this.vel.x = 0;
                    this.vel.y = 0;
                    // Skip AI movement when frozen
                } else if (player.stats.slowField > 0) {
                    if (this.freezeCooldown > 0) this.freezeCooldown--;
                    
                    const dist = Math.hypot(player.pos.x - this.pos.x, player.pos.y - this.pos.y);
                    if (dist < player.stats.slowField && this.freezeCooldown <= 0) {
                        this.freezeTimer = player.stats.slowFieldDuration;
                        this.freezeCooldown = this.freezeTimer + 120; // 2s immunity after freeze
                        spawnParticles(this.pos.x, this.pos.y, 5, '#0ff');
                    }
                }
                
                if (this.shieldSegments.length > 0) this.shieldRotation += 0.05;

                if (this.hp <= 2 && this.type !== 'roamer') {
                     if (Math.random() < 0.1) spawnSmoke(this.pos.x, this.pos.y, 1);
                }

                this.aiTimer--;
                if (this.aiTimer <= 0) this.updateAIState();

                // Only calculate movement if not frozen
                if (this.freezeTimer <= 0) {

                const desiredVel = new Vector(0, 0);
                if (this.aiState === 'SEEK') {
                    if (player && !player.dead) {
                        desiredVel.x = player.pos.x - this.pos.x;
                        desiredVel.y = player.pos.y - this.pos.y;
                    }
                } else if (this.aiState === 'ORBIT') {
                    if (player && !player.dead) {
                        const dx = player.pos.x - this.pos.x;
                        const dy = player.pos.y - this.pos.y;
                        const dist = Math.hypot(dx, dy);
                        const angle = Math.atan2(dy, dx) + (this.type === 'elite_roamer' ? 0.05 : 0.02);
                        desiredVel.x = Math.cos(angle); 
                        desiredVel.y = Math.sin(angle);
                        if (dist > 600) { desiredVel.x += dx*0.001; desiredVel.y += dy*0.001; }
                        if (dist < 400) { desiredVel.x -= dx*0.001; desiredVel.y -= dy*0.001; }
                    }
                } else if (this.aiState === 'ATTACK_RUN') {
                    if (player && !player.dead) {
                        desiredVel.x = player.pos.x - this.pos.x;
                        desiredVel.y = player.pos.y - this.pos.y;
                    }
                } else if (this.aiState === 'RETREAT') {
                    if (this.assignedBase && !this.assignedBase.dead) {
                        desiredVel.x = this.assignedBase.pos.x - this.pos.x;
                        desiredVel.y = this.assignedBase.pos.y - this.pos.y;
                    } else if (player) {
                        desiredVel.x = this.pos.x - player.pos.x;
                        desiredVel.y = this.pos.y - player.pos.y;
                    }
                } else if (this.aiState === 'FLANK') {
                    if (player && !player.dead) {
                        const dx = player.pos.x - this.pos.x;
                        const dy = player.pos.y - this.pos.y;
                        const angleToPlayer = Math.atan2(dy, dx);
                        // Break off at ~60-90 degrees relative to player direction
                        const targetAngle = angleToPlayer + (this.flankSide * (Math.PI / 2.5));
                        desiredVel.x = Math.cos(targetAngle);
                        desiredVel.y = Math.sin(targetAngle);
                    }
                } else if (this.aiState === 'EVADE') {
                    if (player) {
                        const dx = this.pos.x - player.pos.x;
                        const dy = this.pos.y - player.pos.y;
                        desiredVel.x = -dy; 
                        desiredVel.y = dx;
                    }
                }

                if (desiredVel.mag() > 0) desiredVel.normalize();

                if (this.type === 'elite_roamer' || difficultyTier >= 4) {
                    const dodgeForce = this.calculateDodge();
                    desiredVel.add(dodgeForce);
                }

                const sepForce = new Vector(0, 0);
                let count = 0;
                for (let other of enemies) {
                    if (other === this || other.dead) continue;
                    let odx = this.pos.x - other.pos.x;
                    let ody = this.pos.y - other.pos.y;
                    const distSq = odx*odx + ody*ody;
                    if (distSq < 10000) { 
                        const dist = Math.sqrt(distSq);
                        const force = (100 - dist) / 100; 
                        if (dist > 0) {
                            sepForce.x += (odx / dist) * force;
                            sepForce.y += (ody / dist) * force;
                        }
                        count++;
                    }
                }
                if (count > 0) { sepForce.mult(1.5); desiredVel.add(sepForce); }
                
                if (desiredVel.mag() > 0) desiredVel.normalize();
                
                this.smoothDir.x = this.smoothDir.x * 0.92 + desiredVel.x * 0.08;
                this.smoothDir.y = this.smoothDir.y * 0.92 + desiredVel.y * 0.08;

                if (this.smoothDir.mag() > 0.1) {
                    const targetAngle = Math.atan2(this.smoothDir.y, this.smoothDir.x);
                    let angleDiff = targetAngle - this.angle;
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                    if (Math.abs(angleDiff) < this.turnSpeed) {
                        this.angle = targetAngle;
                    } else {
                        this.angle += Math.sign(angleDiff) * this.turnSpeed;
                    }
                    const forwardX = Math.cos(this.angle);
                    const forwardY = Math.sin(this.angle);
                    const dirMag = Math.sqrt(this.smoothDir.x*this.smoothDir.x + this.smoothDir.y*this.smoothDir.y);
                    const dot = (forwardX * this.smoothDir.x + forwardY * this.smoothDir.y) / (dirMag || 1);
                    if (dot > 0.3) {
                         this.vel.x += forwardX * this.thrustPower;
                         this.vel.y += forwardY * this.thrustPower;
                    }
                }
                
                let currentMaxSpeed = this.maxSpeed;
                if (this.aiState === 'FLANK') {
                    currentMaxSpeed *= 1.6; // Speed boost when flanking
                    if (Math.random() < 0.3) spawnParticles(this.pos.x, this.pos.y, 1, '#fa0'); // Engine flare
                }

                const speed = this.vel.mag();
                if (speed > currentMaxSpeed) this.vel.mult(currentMaxSpeed / speed);
                } // End freeze check

                this.vel.mult(this.friction);
                super.update();
                checkWallCollision(this, 0.8); 
                
                let distToPlayer = Infinity;
                if (player && !player.dead) distToPlayer = Math.hypot(player.pos.x - this.pos.x, player.pos.y - this.pos.y);
                const attackRange = (this.type === 'elite_roamer' || this.type === 'hunter') ? 800 : 600;

                if (distToPlayer < attackRange && !player.dead && this.freezeTimer <= 0) {
                    this.shootTimer--;
                    if (this.shootTimer <= 0) {
                        const angle = this.getAimAngle();
                        if (this.type === 'elite_roamer' || this.type === 'hunter') {
                             const bx = this.pos.x + Math.cos(angle)*25;
                             const by = this.pos.y + Math.sin(angle)*25;
                             bullets.push(new Bullet(bx, by, angle, true, 2, 11, 5, '#f0f'));
                             spawnBarrelSmoke(bx, by, angle);
                             this.shootTimer = this.type === 'hunter' ? 45 : 90;
                        } else if (difficultyTier >= 5 && this.type === 'roamer') { 
                             for (let i = -1; i <= 1; i++) {
                                 const a = angle + i * 0.2;
                                 const bx = this.pos.x + Math.cos(a) * 20;
                                 const by = this.pos.y + Math.sin(a) * 20;
                                 bullets.push(new Bullet(bx, by, a, true, 1));
                                 spawnBarrelSmoke(bx, by, a);
                             }
                             this.shootTimer = 120;
                        } else {
                             const bx = this.pos.x + Math.cos(angle) * 20;
                             const by = this.pos.y + Math.sin(angle) * 20;
                             bullets.push(new Bullet(bx, by, angle, true, 1));
                             spawnBarrelSmoke(bx, by, angle);
                             this.shootTimer = 120;
                        }
                        playSound('shoot');
                    }
                }
            }

            updateAIState() {
                if (!player || player.dead) { this.aiState = 'IDLE'; this.aiTimer = 60; return; }
                const dist = Math.hypot(player.pos.x - this.pos.x, player.pos.y - this.pos.y);

                if (this.type === 'roamer') {
                    // Check for bunching/crowding
                    let neighbors = 0;
                    for(let e of enemies) {
                        if (e !== this && !e.dead && e.type === 'roamer') {
                            const dSq = (e.pos.x - this.pos.x)**2 + (e.pos.y - this.pos.y)**2;
                            if (dSq < 40000) neighbors++; // within 200px
                        }
                    }

                    if (neighbors >= 3) {
                        this.aiState = 'FLANK';
                        this.aiTimer = 45 + Math.random() * 30;
                        this.flankSide = Math.random() < 0.5 ? 1 : -1;
                    } else if (dist > 800) {
                        this.aiState = 'SEEK';
                        this.aiTimer = 60;
                    } else {
                        const roll = Math.random();
                        if (roll < 0.6) { this.aiState = 'ORBIT'; this.aiTimer = 120 + Math.random()*60; }
                        else { this.aiState = 'ATTACK_RUN'; this.aiTimer = 60; }
                    }
                } else if (this.type === 'hunter') {
                    // Aggressive
                    if (dist > 1000) { this.aiState = 'SEEK'; this.aiTimer = 60; }
                    else { this.aiState = 'ATTACK_RUN'; this.aiTimer = 120; }
                } else if (this.type === 'defender') {
                    if (this.assignedBase && !this.assignedBase.dead) {
                        const distBase = Math.hypot(player.pos.x - this.assignedBase.pos.x, player.pos.y - this.assignedBase.pos.y);
                        if (distBase < 800) { this.aiState = 'ATTACK_RUN'; this.aiTimer = 60; } 
                        else if (this.hp < 2) { this.aiState = 'RETREAT'; this.aiTimer = 120; }
                        else { this.aiState = 'SEEK'; this.aiTimer = 60; } 
                    } else {
                        this.aiState = 'SEEK'; 
                        this.aiTimer = 60;
                    }
                } else if (this.type === 'elite_roamer') {
                    if (dist < 400) { this.aiState = 'EVADE'; this.aiTimer = 45; }
                    else if (dist > 900) { this.aiState = 'SEEK'; this.aiTimer = 45; }
                    else {
                        this.aiState = Math.random() < 0.5 ? 'ORBIT' : 'ATTACK_RUN';
                        this.aiTimer = 90;
                    }
                }
            }

            calculateDodge() {
                const dodgeVec = new Vector(0,0);
                for(let b of bullets) {
                    if (b.isEnemy) continue; 
                    const dist = Math.hypot(b.pos.x - this.pos.x, b.pos.y - this.pos.y);
                    if (dist < 200) {
                        const toMeX = this.pos.x - b.pos.x;
                        const toMeY = this.pos.y - b.pos.y;
                        const dot = toMeX * b.vel.x + toMeY * b.vel.y;
                        if (dot > 0) {
                            const perpX = -b.vel.y;
                            const perpY = b.vel.x;
                            dodgeVec.x += perpX;
                            dodgeVec.y += perpY;
                        }
                    }
                }
                if (dodgeVec.mag() > 0) {
                    dodgeVec.normalize();
                    dodgeVec.mult(3.0); 
                }
                return dodgeVec;
            }

            draw(ctx) {
                if (this.dead) return;
                ctx.save();
                ctx.translate(this.pos.x, this.pos.y);
                if (this.shieldSegments.length > 0) {
                    if (this.freezeTimer > 0) {
                        ctx.strokeStyle = '#0ff';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(-this.radius, -this.radius, this.radius*2, this.radius*2);
                    }
                    ctx.save();
                    ctx.rotate(this.shieldRotation);
                    const segCount = this.shieldSegments.length;
                    const segAngle = (Math.PI * 2) / segCount;
                    ctx.lineWidth = 2;
                    for(let i=0; i<segCount; i++) {
                        if (this.shieldSegments[i] > 0) {
                            ctx.strokeStyle = '#f0f';
                            ctx.beginPath();
                            ctx.arc(0, 0, this.shieldRadius, i * segAngle, (i+1) * segAngle - 0.2);
                            ctx.stroke();
                        }
                    }
                    ctx.restore();
                }

                ctx.save();
                ctx.rotate(this.angle); 
                if (this.freezeTimer > 0) {
                    ctx.fillStyle = '#0aa';
                    ctx.strokeStyle = '#0ff';
                }
                else {
                if (this.type === 'elite_roamer') {
                    ctx.fillStyle = '#303';
                    ctx.strokeStyle = '#f0f';
                } else if (this.type === 'hunter') {
                    ctx.fillStyle = '#420';
                    ctx.strokeStyle = '#fa0';
                } else if (this.type === 'defender') {
                    ctx.fillStyle = '#611';
                    ctx.strokeStyle = '#f88'; 
                } else {
                    ctx.fillStyle = '#411';
                    ctx.strokeStyle = '#f55';
                }
                }
                ctx.lineWidth = 2;
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#f00';
                
                ctx.beginPath();
                if (this.type === 'elite_roamer') {
                    ctx.moveTo(25, 0);
                    ctx.lineTo(-15, 18);
                    ctx.lineTo(-5, 0);
                    ctx.lineTo(-15, -18);
                } else if (this.type === 'hunter') {
                    ctx.moveTo(30, 0);
                    ctx.lineTo(-15, 12);
                    ctx.lineTo(-10, 0);
                    ctx.lineTo(-15, -12);
                } else {
                    ctx.moveTo(18, 0);
                    ctx.lineTo(-12, 12);
                    ctx.lineTo(-6, 0);
                    ctx.lineTo(-12, -12);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                
                ctx.shadowBlur = 0;
                if (this.hp < (this.type === 'elite_roamer' ? 5 : 5) && this.type !== 'roamer') {
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    const count = (5 - this.hp);
                    for(let i=0; i<count; i++) {
                         const x1 = (Math.random()-0.5)*15;
                         const y1 = (Math.random()-0.5)*15;
                         const x2 = x1 + (Math.random()-0.5)*10;
                         const y2 = y1 + (Math.random()-0.5)*10;
                         ctx.moveTo(x1, y1);
                         ctx.lineTo(x2, y2);
                    }
                    ctx.stroke();
                }
                ctx.restore(); 
                
                let aimAngle = 0;
                if (player && !player.dead) aimAngle = this.getAimAngle();
                ctx.save();
                ctx.rotate(aimAngle);
                ctx.fillStyle = '#000';
                ctx.strokeStyle = '#f55';
                
                if (this.type === 'elite_roamer' || this.type === 'hunter') {
                     ctx.beginPath(); ctx.rect(0, -4, 25, 8); ctx.fill(); ctx.stroke();
                } else {
                     ctx.beginPath();
                     ctx.rect(0, -3, 20, 6);
                     ctx.fill();
                     ctx.stroke();
                }
                
                ctx.beginPath();
                ctx.arc(0, 0, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#500';
                ctx.fill();
                ctx.strokeStyle = '#f00';
                ctx.stroke();
                ctx.restore(); 
                ctx.restore(); 
            }
        }

        class Base extends Entity {
            constructor(x, y, type = 'standard') {
                super(0, 0);
                this.pos.x = x;
                this.pos.y = y;
                this.type = type; 
                this.radius = 70; 
                this.hp = 10 + (difficultyTier - 1) * 5; 
                this.shootTimer = 150;
                this.angle = 0;
                this.turretAngle = 0;
                this.shieldRadius = 110;
                this.aggro = false; 
                
                let outerCount = 24;
                let outerHp = 1;
                let innerCount = 0;
                let innerHp = 0;

                if (difficultyTier === 1) { outerCount = 12; outerHp = 1; }
                else if (difficultyTier === 2) { outerCount = 16; outerHp = 1; }
